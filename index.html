<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>EquiStories Stable Manager</title>

<body>
<div id="app"></div>
<style>
  html, body{ background:#1b1410; margin:0; padding:0; }
  #app{
    --bg:#1b1410; --panel:#241a14; --panel2:#2c2118; --accent:#c98a3a; --accent2:#7a9b6e; --warn:#d4a030; --good:#7a9b6e;
    --text:#f1e6d8; --dim:#b5a392; --danger:#b1473f; --warn:#c9a23a; --good:#7a9b6e;

  #app .tab{padding:7px 14px; background:var(--panel2); border:1px solid #4a392a; border-radius:6px 6px 0 0; cursor:pointer; color:var(--dim); font-size:.92em;}
  #app .tab.active{background:var(--accent); color:#241a14; border-color:var(--accent); font-weight:bold;}
  #app .card{background:var(--panel); border:1px solid #4a392a; border-radius:8px; padding:14px; margin-bottom:12px;}
  #app .row{display:flex; gap:10px; flex-wrap:wrap;}
  #app .row > div{flex:1; min-width:140px;}
  #app label{font-size:.78em; color:var(--dim); display:block; margin-bottom:2px; text-transform:uppercase; letter-spacing:.5px;}
  #app input, #app select, #app textarea{
    width:100%; padding:6px 8px; background:#15100c; border:1px solid #4a392a; color:var(--text);
    border-radius:5px; font-family:inherit; font-size:.95em; box-sizing:border-box;
  }
  #app button{
    background:var(--accent); color:#231a12; border:none; padding:8px 14px; border-radius:6px;
    cursor:pointer; font-weight:bold; font-family:inherit; font-size:.9em; margin-top:6px;
  }
  #app button.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--accent);}
  #app button.danger{background:var(--danger); color:#fff;}
  #app button:hover{opacity:.88;}
  #app .horse-card{background:var(--panel2); border:1px solid #4a392a; border-radius:8px; padding:12px; margin-bottom:10px;}
  #app .horse-top-row{display:flex; gap:12px; align-items:flex-start;}
  #app .horse-photo-wrap{display:flex; flex-direction:column; align-items:center; flex:none;}
  #app .horse-photo{width:72px; height:72px; border-radius:8px; object-fit:cover; border:2px solid var(--accent); background:#15100c;}
  #app .horse-photo-placeholder{display:flex; align-items:center; justify-content:center; font-size:2em; color:#4a392a;}
  #app .artlog-panel{margin-top:10px; background:#15100c; border:1px solid #4a392a; border-radius:6px; padding:8px; max-height:260px; overflow-y:auto;}
  #app .artlog-entry{padding:6px 0; border-bottom:1px dashed #2c2118;}
  #app .artlog-entry:last-child{border-bottom:none;}
  #app .artlog-link{color:var(--accent); text-decoration:underline;}
  #app .horse-head{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px;}
  #app .horse-head .name{font-size:1.15em; color:var(--accent); font-weight:bold;}
  #app .tag{display:inline-block; font-size:.72em; padding:2px 8px; border-radius:10px; margin-left:6px; background:#15100c; color:var(--dim); border:1px solid #4a392a;}
  #app .tag.sick{background:var(--warn); color:#241a14;}
  #app .tag.injured{background:var(--danger); color:#fff;}
  #app .tag.healthy{background:var(--good); color:#15100c;}
  #app .tag.retired{background:#5a5247; color:#f1e6d8; border-color:#8a7f6e;}
  #app .tag.deceased{background:#0c0c0c; color:#8a7f6e; border-color:#3a3a3a;}
  #app .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-top:8px; font-size:.85em;}
  #app .statbar-wrap{display:flex; align-items:center; gap:6px;}
  #app .statbar-bg{flex:1; height:7px; background:#15100c; border-radius:4px; overflow:hidden;}
  #app .statbar-fill{height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent));}
  #app .expbar-bg{height:9px; background:#15100c; border-radius:5px; overflow:hidden; margin-top:4px;}
  #app .expbar-fill{height:100%; background:linear-gradient(90deg,#8a6fb0,#c98a3a);}
  #app .small{font-size:.8em; color:var(--dim);}
  #app .log{max-height:220px; overflow-y:auto; background:#15100c; border-radius:6px; padding:8px; font-size:.85em; border:1px solid #4a392a;}
  #app .log div{margin-bottom:4px; padding-bottom:4px; border-bottom:1px dashed #2c2118;}
  #app .prompt-box{background:#15100c; border:1px dashed var(--accent); border-radius:6px; padding:10px; margin-top:8px; font-style:italic; color:var(--text);}
  #app .pill-select{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  #app .pill{padding:5px 10px; background:#15100c; border:1px solid #4a392a; border-radius:14px; font-size:.82em; cursor:pointer; color:var(--dim);}
  #app .pill.active{background:var(--accent); color:#241a14; border-color:var(--accent);}
  #app .result{padding:10px; border-radius:6px; margin-top:8px; font-weight:bold;}
  #app .result.success{background:rgba(122,155,110,.2); border:1px solid var(--good); color:var(--good);}
  #app .result.fail{background:rgba(177,71,63,.2); border:1px solid var(--danger); color:var(--danger);}
  #app .daybox{display:flex; align-items:center; justify-content:space-between; background:var(--panel2); padding:12px 16px; border-radius:8px; margin-bottom:12px;}
  #app .daybox .day{font-size:1.4em; color:var(--accent); font-weight:bold;}
  #app select[multiple]{height:auto;}

  #modal-overlay .row { display:flex; gap:10px; }

  #modal-overlay button { padding:9px 18px; border:none; border-radius:6px; cursor:pointer; font-size:.9em; background:var(--accent); color:#241a14; font-weight:bold; }

  .tag.injured { background:#4a1a1a; color:#e8a0a0; border-color:#8a3a3a; }
  .tag.retired { background:#2a2a2a; color:#a0a0a0; border-color:#5a5a5a; }

const DISCIPLINES = {

  "Cross Country": ["stamina","boldness","speed"],

  "3-Day Eventing": ["balance","gaits","strength","boldness","scope","handiness","stamina","speed"],
  "Forest Work / Log Pulling": ["stamina","strength","handiness"],
  "Cart Driving": ["stamina","strength","boldness"],
  "Working Equitation Trail": ["harmony","balance","strength"],
  "Western Pleasure": ["harmony","balance","gaits"],

};

const ART_EXP = {
  "Uncolored Headshot": 1, "Colored Headshot": 2, "Uncolored Fullbody": 3,
  "Colored Fullbody": 4,
};

const LIT_EXP = {}; // legacy — word count now handled dynamically

function calcLitExp(wordCount){
  if(!wordCount || wordCount < 200) return 0;
  return 2 + Math.floor((wordCount - 200) / 500) * 2;
}

const BONUS_EXP = {
  "Background": 3, "Shading": 3, "Rider/Handler shown": 4, "Additional Creature (per)": 2,
};

const BANK_URL   = 'https://script.google.com/macros/s/AKfycby9WLxUPDAPg9EH5aTPATzTkHd8XeSKXuQ0WYqyQoHusEbws85qxwaML6cSovDod80/exec';
// ← Paste your Stable Data script /exec URL here after deploying it:
let STABLE_URL = localStorage.getItem('equi_stable_url') || '';

const PLACEMENT_BUXX_AMOUNTS_LEGACY = { 1: 1000, 2: 750, 3: 500, 4: 250, 5: 100, 6: 50 };

let state = { horses: [], day: 1, log: [], loaded: false };
let bankAccount = { userId: '', password: '', linked: false };

function uid(){ return 'h_' + Math.random().toString(36).slice(2,9); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function todayLabel(d){ return "Day " + d; }

function newHorse(data){
  let stats = {};
  STATS.forEach(s=> stats[s] = 10);
  const age = Number(data.age)||1;
  const birthYear = (data.birthYear) ? Number(data.birthYear) : (new Date().getFullYear() - age);
  return {
    id: uid(), name: data.name, age: age, breed: data.breed,
    joinedOnDay: data.joinedOnDay !== undefined ? data.joinedOnDay : (typeof state !== 'undefined' ? state.day : 1),
    birthYear: birthYear,
    stage: data.stage || ageToStage(age),
    gender: data.gender || "",
    color: data.color || "",
    geno: data.geno || "",
    traits: data.traits || "",
    mutations: data.mutations || "",
    level: 1, exp: 0, stats: stats,
    breedingSlots: LEVEL_TABLE[1].slots, breedingFilled: 0,
    status: "healthy", statusDays: 0,
    daysOwned: 0,
    eventsEnabled: data.eventsEnabled !== false,
    agingEnabled: data.agingEnabled !== false,
    // Health conditions (all optional)
    conditions: {
      blind: data.conditions?.blind || false,
      deaf: data.conditions?.deaf || false,
      asthma: data.conditions?.asthma || false,
      cushings: data.conditions?.cushings || false,
      kissingSpine: data.conditions?.kissingSpine || false,

      pastInjuries: data.conditions?.pastInjuries || [],  // free-text list
    },
    // Tack
    tack: data.tack || { saddle:"", bridle:"", other:"", shoes:"", bonuses:[] },
    vetCare: data.vetCare || {
      lastVaccineDay: null,     // day routine shots were last given
      vaccineProtected: false,  // reduced illness chance until next year
    },
    farrierCare: data.farrierCare || {
      lastVisitDay: null,       // day of last farrier visit
      nextDueDay: null,         // last + 45
      hoofIssues: [],           // discovered hoof problems
    },
    chronicCare: data.chronicCare || {
      // Navicular
      navicular: false,
      navicularShoes: false,    // egg-bar + wedge fitted
      navicularNSAIDs: false,
      osphosDue: null,          // day next OSPHOS injection is due
      osphosMissed: 0,          // consecutive missed doses
      // Laminitis
      laminitis: false,
      laminitisStage: null,     // "acute" | "chronic"
      laminitisXray: false,
      laminitisShoes: false,
      laminitisNSAIDs: false,
      strictDiet: false,        // timothy only, no alfalfa, no sugary treats
      dryPaddock: false,        // must be kept off grass
      emsRisk: false,           // flagged as potential EMS
      // Arthritis
      arthritis: false,
      arthritisSeverity: 0,     // 0-3: mild, moderate, severe, retirement
      adequanDue: null,         // day next Adequan is due
      adequanMissed: 0,
      arthritisNSAIDs: false,

function ageToStage(age){
  if(age < 1) return "foal";
  if(age < 2) return "yearling";
  if(age < 3) return "two-year-old";
  return "adult";
}

function addLog(msg, dayOverride){
  state.log.unshift({day: dayOverride !== undefined ? dayOverride : state.day, msg});
  if(state.log.length>150) state.log.pop();
}

// ============================================
// STABLE API — save/load to Google Sheets
// ============================================

function stableGas(payload){
  return new Promise((resolve) => {
    if(!STABLE_URL){ resolve({success:false, error:'No Stable Data URL configured.'}); return; }
    const callbackName = 'stableCb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const url = STABLE_URL + '?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(payload));
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true; delete window[callbackName];
      try{ document.head.removeChild(script); }catch(e){}
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Network error reaching Stable Data script.'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out.'}); } }, 15000);
    script.src = url;
    document.head.appendChild(script);
  });
}

// Save entire stable to Google Sheets (called after every action)
async function save(){
  if(!bankAccount.linked || !STABLE_URL){ return; }
  const userId = bankAccount.userId;
  // Save state (day + log)
  await stableGas({ action:'saveStableState', userId, stateJson: JSON.stringify({day: state.day, log: state.log}) });
  // Save each horse (without artLog — that's stored separately)
  for(const h of state.horses){
    const { artLog, ...horseData } = h;
    await stableGas({ action:'saveHorse', userId, horseId: h.id, horseJson: JSON.stringify(horseData) });
  }
}

// Save just one horse (faster — used after training/competing)
async function saveHorse(horse){
  if(!bankAccount.linked || !STABLE_URL) return;
  const { artLog, ...horseData } = horse;
  await stableGas({ action:'saveHorse', userId: bankAccount.userId, horseId: horse.id, horseJson: JSON.stringify(horseData) });
}

// Save a new art log entry for a horse
async function saveArtEntry(horse, entry){
  if(!bankAccount.linked || !STABLE_URL) return;
  await stableGas({ action:'saveArtLogEntry', userId: bankAccount.userId, horseId: horse.id, entryJson: JSON.stringify(entry) });
}

async function saveBankAccount(){
  try{
    localStorage.setItem('equi_bank', JSON.stringify(bankAccount));
  }catch(e){ console.error('bank save failed', e); }
}

async function load(){
  // Always load bank credentials from localStorage first (they stay on this device)
  try{
    const b = localStorage.getItem('equi_bank');
    if(b){ const bd = JSON.parse(b); bankAccount = { userId: bd.userId||'', password: bd.password||'', linked: bd.linked||false }; }
  }catch(e){}

  if(bankAccount.linked && STABLE_URL){
    // Load from Google Sheets
    await loadFromSheets();
  } else {
    // No account linked yet — show login screen
    state.loaded = true;
    state.horses = [];
    state.day = 1;
    state.log = [];
  }
  render();
}

async function loadFromSheets(){
  const userId = bankAccount.userId;
  // Load stable state (day + log)
  const stateRes = await stableGas({ action:'loadStableState', userId });
  if(stateRes.success && stateRes.data){
    state.day = stateRes.data.day || 1;
    state.log = stateRes.data.log || [];
  } else {
    state.day = 1; state.log = [];
  }
  // Load horses
  const horsesRes = await stableGas({ action:'loadStable', userId });
  if(horsesRes.success && horsesRes.data){
    state.horses = horsesRes.data;
  } else {
    state.horses = [];
  }
  state.loaded = true;
}

function checkLevelUp(horse){
  let leveled = false;
  while(horse.level < 10 && horse.exp >= LEVEL_TABLE[horse.level+1].exp){
    horse.level += 1;
    const t = LEVEL_TABLE[horse.level];
    STATS.forEach(s=> horse.stats[s] += t.bonus);
    horse.breedingSlots += t.slots;
    leveled = true;
    const targetSlots = Object.values(LEVEL_TABLE).slice(0, horse.level).reduce((a,l)=>a+l.slots, 0);
    addLog(`🎉 ${horse.name} reached Level ${horse.level}! +${t.bonus} to all stats` + (t.slots? `, +${t.slots} breeding slot(s) unlocked (total: ${horse.breedingSlots})` : "") + ".");
  }
  return leveled;
}

function conditionInjuryModifier(h){
  // Returns an injury chance multiplier based on active conditions
  let mod = 1.0;
  if(h.conditions?.suspensory) mod += 0.4;  // prior suspensory = 40% more likely
  if(h.conditions?.kissingSpine) mod += 0.25;
  if(h.conditions?.asthma) mod += 0.1;
  if(h.conditions?.cushings) mod += 0.2;
  if(h.conditions?.blind) mod += 0.15;     // more likely to spook/trip
  if((h.conditions?.pastInjuries||[]).length > 0) mod += 0.1 * Math.min((h.conditions.pastInjuries.length), 3);
  return mod;
}

function triggerCondition(h, conditionId, day){
  if(!conditionId) return;
  const def = CONDITIONS[conditionId];
  if(!def) return;
  if(!h.activeConditions) h.activeConditions = {};
  if(h.activeConditions[conditionId]?.active) return; // already have it

  const entry = {
    active: true,
    diagnosedDay: day || state.day,
    severity: def.severity,
    // Recurring care tracking
    nextDueDay: def.recurringCare ? (day||state.day) + def.recurringCare.intervalDays : null,
    missedDoses: 0,
    careStreak: 0,      // consecutive on-time treatments (for -10% bonus)
    // Condition-specific flags
    shoesFitted: false,
    strictDiet: false,
    dryPaddock: false,
    diagnosed: !def.diagnosisRequired,
    progressionLevel: 0,  // 0=mild 1=moderate 2=severe 3=critical
  };

  h.activeConditions[conditionId] = entry;

  // Apply initial layup
  if(def.initialLayup && def.initialLayup > 0){
    h.status = "injured";
    h.statusDays = Math.max(h.statusDays||0, def.initialLayup);
  }

  // Permanent injury modifier
  if(def.permanentModifier){
    if(!h.conditions) h.conditions = {};
    h.conditions.suspensory = true;
  }

  const diagNote = def.diagnosisRequired
    ? ` A ${def.diagnosisRequired==="farrier"?"farrier diagnostic visit":"vet examination"} is required — head to the 🩺 Vet & Farrier tab.`
    : "";
  addLog(`${def.icon} ${def.name.toUpperCase()} DETECTED: ${h.name} has developed ${def.name}.${diagNote}`, day);
  if(def.treatments?.length){
    addLog(`⚕️ Initial treatment for ${h.name}: ${def.treatments.join(", ")}.${def.initialLayup?` Lay-up: ${def.initialLayup} days.`:""}`, day);
  }
  if(def.recurringCare){
    addLog(`📅 ${h.name} will need ${def.recurringCare.type==="osphos"?"OSPHOS injections":"Adequan injections"} every ${def.recurringCare.intervalDays} days — track in the Vet & Farrier tab!`, day);
  }
  if(def.permanentRestrictions?.length){
    addLog(`🚫 PERMANENT RESTRICTIONS for ${h.name}: ${def.permanentRestrictions.join(", ")}.`, day);
  }
}

// Shorthand helpers kept for backwards compat
function triggerLaminitis(h, day){ triggerCondition(h, "laminitis", day); if(h.activeConditions?.laminitis) h.activeConditions.laminitis.laminitisStage="acute"; }
function triggerNavicular(h, day){ triggerCondition(h, "navicular", day); }
function triggerArthritis(h, day){ triggerCondition(h, "arthritis", day); }

function getConditionModifier(h){
  let mod = 1.0;
  // Legacy conditions
  if(h.conditions?.suspensory) mod += 0.4;
  if(h.conditions?.kissingSpine) mod += 0.25;
  if(h.conditions?.asthma) mod += 0.1;
  if(h.conditions?.cushings) mod += 0.2;
  if(h.conditions?.blind) mod += 0.15;
  if((h.conditions?.pastInjuries||[]).length > 0) mod += 0.1 * Math.min(h.conditions.pastInjuries.length, 3);
  // Active conditions
  const ac = h.activeConditions || {};
  if(ac.navicular?.active) mod += 0.2;
  if(ac.arthritis?.active) mod += 0.15 + (ac.arthritis.progressionLevel||0)*0.1;
  if(ac.suspensory?.active) mod += 0.4;
  if(ac.tendonStrain?.active) mod += 0.2;
  return mod;
}
// Keep old name working
function conditionInjuryModifier(h){ return getConditionModifier(h); }

function addFarrierHoofIssue(h, day){

  const hoofConds = ["abscess","thrush","stoneBruise","whiteLine"];

  if(!eligible.length) return;

// Roll for conditions in day advancement based on discovery chances
function rollDayConditions(h, day){
  if(!h.activeConditions) h.activeConditions = {};
  const ac = h.activeConditions;
  Object.entries(CONDITIONS).forEach(([id, def])=>{
    if(ac[id]?.active) return;   // already have it
    const chance = def.discoveryChance?.day || 0;
    if(chance > 0 && Math.random() < chance * conditionInjuryModifier(h)){
      triggerCondition(h, id, day);
    }
    // Laminitis pasture risk if not on dry paddock
    if(id === "laminitis" && !ac.laminitis?.active){
      const pastureChance = def.discoveryChance?.pasture || 0;
      if(pastureChance > 0 && !ac.laminitis?.dryPaddock && Math.random() < pastureChance * 0.05){
        triggerCondition(h, "laminitis", day);
      }
    }
  });
}

// Catastrophic laminitis flare for horses already diagnosed left on pasture
function checkLaminitisFlare(h, day){
  const ac = h.activeConditions;
  if(!ac?.laminitis?.active) return;
  if(ac.laminitis.dryPaddock) return;
  if(Math.random() < 0.12){
    addLog(`🌿 ⚠️ LAMINITIS FLARE: ${h.name} has been on pasture despite their diagnosis. Condition has worsened — emergency vet!`, day);
    h.status = "injured"; h.statusDays = rand(14,28);
    ac.laminitis.progressionLevel = Math.min((ac.laminitis.progressionLevel||0)+1, 3);
    if(ac.laminitis.progressionLevel >= 3 && Math.random() < 0.4){
      h.status = "retired";
      addLog(`🚫 The laminitis rotation has been too severe — ${h.name} must be retired.`, day);
    }
  }
}

// Annual progression check for chronic conditions
function rollAnnualProgression(h, day){
  const ac = h.activeConditions || {};
  Object.entries(CONDITIONS).forEach(([id, def])=>{
    if(!ac[id]?.active) return;
    if(!def.progressionChance || def.progressionChance <= 0) return;
    let chance = def.progressionChance;
    if(h.age > 15) chance += def.ageModifier * (h.age - 15);
    if(ac[id].missedDoses > 0) chance += def.missedPenalty || 0;
    if(ac[id].careStreak >= 4) chance += def.careBonus || 0;
    if(Math.random() < chance){
      ac[id].progressionLevel = Math.min((ac[id].progressionLevel||0)+1, 3);
      const labels = ["Mild","Moderate","Severe","Critical"];
      addLog(`📈 ${h.name}'s ${def.name} has progressed to ${labels[ac[id].progressionLevel]}.`, day);
      if(ac[id].progressionLevel >= 3){
        addLog(`🚫 ${h.name}'s ${def.name} has reached critical severity — retirement evaluation needed.`, day);
        if(def.catastrophicConsequence?.includes("retirement")) h.status = "retired";
      }
    }
  });
}

// Check recurring care reminders (adequan, osphos)
function checkRecurringCare(h, day){
  const ac = h.activeConditions || {};
  Object.entries(CONDITIONS).forEach(([id, def])=>{
    if(!ac[id]?.active || !def.recurringCare) return;
    const entry = ac[id];
    if(!entry.nextDueDay || day < entry.nextDueDay) return;
    const care = def.recurringCare;
    const label = care.type === "osphos" ? "OSPHOS" : "Adequan";
    addLog(`💊 ${label.toUpperCase()} DUE: ${h.name} needs their ${label} injection. Head to the Vet & Farrier tab! Missing doses worsens their ${def.name}.`, day);
    entry.missedDoses = (entry.missedDoses||0) + 1;
    entry.careStreak = 0;
    if(entry.missedDoses >= (care.missedMax||999)){
      addLog(`⚠️ ${h.name}'s ${def.name} is worsening due to missed ${label} treatment!`, day);
    }
    if(care.missedPenalty === "layup" && h.status === "healthy"){
      h.status = "injured";
      h.statusDays = care.missedDays || 1;
      addLog(`😣 ${h.name} is in too much pain today — missed ${label} dose means a ${care.missedDays}-day rest.`, day);
    }
    // Reschedule (overdue — set from today)
    entry.nextDueDay = day + care.intervalDays;
  });
}

function advanceDay(){
  const endingDay = state.day;
  const logCountBefore = state.log.length;
  state.horses.forEach(h=>{
    if(h.status === "deceased") return;
    h.daysOwned += 1;
    if(!h.vetCare)     h.vetCare = {lastVaccineDay:null, vaccineProtected:false};
    if(!h.farrierCare) h.farrierCare = {lastVisitDay:null, nextDueDay:null, hoofIssues:[]};
    if(!h.chronicCare) h.chronicCare = {};

    // --- CHRONIC CARE & CONDITION CHECKS (new data-driven engine) ---
    if(!h.activeConditions) h.activeConditions = {};
    checkRecurringCare(h, endingDay);
    checkLaminitisFlare(h, endingDay);
    // Annual progression on birthday
    if(h.agingEnabled !== false){
      const joined = h.joinedOnDay || 1;
      if((endingDay - joined) > 0 && (endingDay - joined) % 365 === 0){
        rollAnnualProgression(h, endingDay);
      }
    }
    // Farrier due reminder
    if(h.farrierCare.nextDueDay && endingDay >= h.farrierCare.nextDueDay && !h.farrierCare._reminded){
      h.farrierCare._reminded = true;
      addLog(`🪝 FARRIER DUE: It has been 45 days since ${h.name}'s last farrier visit. Head to the 🩺 Vet & Farrier tab!`, endingDay);
    }
    // Vaccine due (every 180 days)
    if(h.vetCare.lastVaccineDay && (endingDay - h.vetCare.lastVaccineDay) >= 180 && !h.vetCare._vaccineReminded){
      h.vetCare._vaccineReminded = true;
      addLog(`💉 VACCINES DUE: ${h.name} is due for their bi-annual shots. Schedule a routine vet visit!`, endingDay);
    }
    if(h.vetCare.vaccineProtected && h.vetCare.lastVaccineDay && (endingDay - h.vetCare.lastVaccineDay) >= 180){
      h.vetCare.vaccineProtected = false;
      addLog(`💉 ${h.name}'s vaccine protection has expired. Time for a booster!`, endingDay);
    }

    if(h.status === "retired") return;

    if(h.status !== "healthy"){
      h.statusDays -= 1;
      if(h.statusDays <= 0){
        addLog(`✅ ${h.name} has fully recovered and is cleared for work.`, endingDay);
        h.status = "healthy"; h.statusDays = 0;
      } else {
        addLog(`🩺 ${h.name} is still recovering — ${h.statusDays} day(s) left.`, endingDay);
      }
    } else if(h.eventsEnabled === false){
      // health risk disabled
    } else {
      // Roll for RNG condition discovery
      rollDayConditions(h, endingDay);

      const illnessChance = h.vetCare?.vaccineProtected ? 0.012 : 0.03;
      const injuryChance  = 0.05;
      const roll = Math.random();
      if(roll < 0.004){
        const severe = maybeSevereEvent(h, "turnout", 1);
        if(severe){
          addLog(`💥 ${severe.event.name}: ${severe.text}`, endingDay);
          addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`, endingDay);
        }
      } else if(roll < illnessChance){
        const a = pick(AILMENT_EVENTS);
        const days = CONDITIONS[a.conditionId]?.initialLayup;
        const layupDays = days ? rand(days, days*2) : rand(2,6);
        h.status = "sick"; h.statusDays = layupDays;
        addLog(`🤒 ${a.text.replaceAll("{name}", h.name)} Expect about ${layupDays} day(s) before they're back to normal.`, endingDay);
        if(a.conditionId) triggerCondition(h, a.conditionId, endingDay);
      } else if(roll < illnessChance + injuryChance * conditionInjuryModifier(h)){
        const inj = pick(INJURY_EVENTS);
        const injDef = inj.conditionId ? CONDITIONS[inj.conditionId] : null;
        const injDays = injDef?.initialLayup ? rand(injDef.initialLayup, injDef.initialLayup*2) : rand(3,10);
        h.status = "injured"; h.statusDays = injDays;
        addLog(`🩹 ${inj.text.replaceAll("{name}", h.name)} Out for roughly ${injDays} day(s).`, endingDay);
        if(inj.conditionId) triggerCondition(h, inj.conditionId, endingDay);
      }
    }
    // Age up: every 365 days after the day they joined (only if agingEnabled)
    if(h.agingEnabled !== false){
      const joined = h.joinedOnDay !== undefined ? h.joinedOnDay : 1;
      const daysSinceJoiningEnding = endingDay - joined;
      if(daysSinceJoiningEnding > 0 && daysSinceJoiningEnding % 365 === 0){
        h.age += 1;
        h.stage = ageToStage(h.age);
        addLog(`🎂 ${h.name} has turned ${h.age} years old (${h.stage})! — Day ${endingDay} marks their anniversary in the stable.`, endingDay);
      }
    }
  });
  // if nothing horse-specific happened today, log one generic end-of-day line
  if(state.log.length === logCountBefore){
    addLog(`🌙 ${pick(GENERIC_DAY_BEATS)}`, endingDay);
  }
  state.day += 1;
  save();
}

function rollStoryBeat(horse){
  const roll = Math.random();
  let category;
  if(roll < 0.18) category = "breakthrough";
  else if(roll < 0.33) category = "spook";
  else if(roll < 0.43) category = "mishap";
  else category = "neutral";
  let text = pick(STORY_BEATS[category]).replaceAll("{name}", horse.name);
  return {category, text};
}

function maybeSevereEvent(horse, context, chance){
  if(Math.random() >= chance) return null;
  const pool = SEVERE_EVENTS.filter(e=> e.contexts.includes(context));
  if(pool.length === 0) return null;
  const event = pick(pool);
  const text = pick(event.text).replaceAll("{name}", horse.name);
  const died = Math.random() < event.deathChance;
  if(died){
    horse.status = "deceased";
    horse.statusDays = 0;
  } else {
    horse.status = "retired";
    horse.statusDays = 0;
  }
  horse.retired = true;
  return {event, text, died};
}

function applyTraining(horseId, trainingId, artType, litWordCount, bonusKeys, link, trainingId2){
  const h = state.horses.find(x=>x.id===horseId);
  const t = TRAININGS.find(x=>x.id===trainingId);
  const t2 = trainingId2 ? TRAININGS.find(x=>x.id===trainingId2) : null;
  if(!h || !t) return null;

  const severe = h.eventsEnabled !== false ? maybeSevereEvent(h, "training", 0.008) : null;
  if(severe){
    Object.entries(t.stats).forEach(([stat,val])=>{ h.stats[stat] += Math.ceil(val/2); });
    addLog(`💥 ${severe.event.name}: ${severe.text}`);
    addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`);
    save(); render();
    return {beat:{category:"severe", text:severe.text}, severe};
  }

  const beat = rollStoryBeat(h);
  let bonusExp = 0, bonusStat = null, injured = false;
  Object.entries(t.stats).forEach(([stat,val])=>{ h.stats[stat] += val; });
  if(t2) Object.entries(t2.stats).forEach(([stat,val])=>{ h.stats[stat] += val; });
  if(beat.category === "breakthrough"){
    bonusExp = rand(1,3);
    const statKeys = Object.keys(t2 ? allStats : t.stats);
    bonusStat = statKeys[rand(0,statKeys.length-1)];
    h.stats[bonusStat] += 1;
    h.exp += bonusExp;
  } else if(beat.category === "mishap" && h.eventsEnabled !== false){
    if(Math.random() < 0.35 * conditionInjuryModifier(h)){
      injured = true;
      h.status = "injured"; h.statusDays = rand(2,5);
      if(!h.activeConditions) h.activeConditions = {};
      const mishapRoll = Math.random();
      if(mishapRoll < 0.04) triggerCondition(h, "navicular", state.day);
      else if(mishapRoll < 0.09) triggerCondition(h, "arthritis", state.day);
      else if(mishapRoll < 0.11) triggerCondition(h, "laminitis", state.day);
      else if(mishapRoll < 0.18) triggerCondition(h, "tendonStrain", state.day);
      else if(mishapRoll < 0.25) triggerCondition(h, "muscleSoreness", state.day);
    }
  }
  let expGain = 0;
  let sources = [];
  if(artType && ART_EXP[artType]){ expGain += ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`); }
  const litExp = calcLitExp(litWordCount);
  if(litExp > 0){ expGain += litExp; sources.push(`Literature (${litWordCount} words) (+${litExp})`); }
  (bonusKeys||[]).forEach(k=>{
    if(BONUS_EXP[k]){ expGain += BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
  });
  h.exp += expGain;
  const allStats = {...t.stats};
  if(t2) Object.entries(t2.stats).forEach(([s,v])=>{ allStats[s] = (allStats[s]||0) + v; });
  const statsStr = Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
  const trainingLabel = t2 ? `${t.name} + ${t2.name}` : t.name;
  addLog(`🎨 ${h.name} completed "${trainingLabel}" training (${statsStr})` + (expGain? ` and earned +${expGain} EXP total — ${sources.join(", ")}.` : "."));
  addLog(`${beat.category==='breakthrough'?'✨':beat.category==='spook'?'😨':beat.category==='mishap'?'⚠️':'📝'} ${beat.text}` + (bonusStat? ` (Breakthrough bonus: +1 ${STAT_LABELS[bonusStat]}, +${bonusExp} EXP)` : "") + (injured? ` (${h.name} is now injured — out ${h.statusDays} day(s).)` : ""));
  const trainingEntry = {
    day: state.day, type: "training", label: trainingLabel,
    art: artType || null, lit: litWordCount ? `Literature (${litWordCount} words)` : null, bonuses: bonusKeys||[],
    exp: expGain, link: link || null,
  };
  h.artLog.unshift(trainingEntry);
  checkLevelUp(h);
  saveHorse(h);
  saveArtEntry(h, trainingEntry);
  save();
  render();
  return {beat, bonusStat, bonusExp, injured, expGain};
}

function runCompetition(horseId, discipline, difficulty, artType, litWordCount, bonusKeys, link){
  const h = state.horses.find(x=>x.id===horseId);
  if(!h) return null;

  const severe = h.eventsEnabled !== false ? maybeSevereEvent(h, "competition", 0.012) : null;
  if(severe){
    addLog(`💥 ${severe.event.name}: ${severe.text}`);
    addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`);
    save(); render();
    return {success:false, severe, expGain:0};
  }

  const relevant = DISCIPLINES[discipline];
  const avg = relevant.reduce((a,s)=>a+h.stats[s],0) / relevant.length;
  const diffVal = {Local:10, Regional:20, National:35, Elite:50}[difficulty];
  let successChance = clamp(50 + (avg - diffVal) * 2, 5, 95);
  const roll = rand(1,100);
  const success = roll <= successChance;
  let placement = null, expGain = 1; // entry exp
  let injured = false;
  if(success){
    const margin = successChance - roll; // how comfortably they "made" it
    const pRoll = rand(1,100) - margin*0.5;
    if(pRoll < 20) placement = 1;
    else if(pRoll < 45) placement = 2;
    else if(pRoll < 70) placement = 3;
    else if(pRoll < 82) placement = 4;
    else if(pRoll < 92) placement = 5;
    else placement = 6;
    const placeExp = {1:4,2:3,3:2}[placement] || 1;
    expGain += placeExp;
  } else {
    if(h.eventsEnabled !== false && Math.random() < 0.22 * conditionInjuryModifier(h)){
      injured = true;
      h.status = "injured"; h.statusDays = rand(4,9);
      if(!h.activeConditions) h.activeConditions = {};
      const compRoll = Math.random();
      if(compRoll < 0.07) triggerCondition(h, "arthritis", state.day);
      else if(compRoll < 0.10) triggerCondition(h, "navicular", state.day);
      else if(compRoll < 0.18) triggerCondition(h, "tendonStrain", state.day);
      else if(compRoll < 0.25) triggerCondition(h, "suspensory", state.day);
    }
  }
  let sources = [];
  if(artType && ART_EXP[artType]){ expGain += ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`); }
  const litExp = calcLitExp(litWordCount);
  if(litExp > 0){ expGain += litExp; sources.push(`Literature (${litWordCount} words) (+${litExp})`); }
  (bonusKeys||[]).forEach(k=>{
    if(BONUS_EXP[k]){ expGain += BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
  });
  h.exp += expGain;
  const leveled = checkLevelUp(h);
  const resultMsg = success
    ? `🏆 ${h.name} competed in ${discipline} (${difficulty}) and placed ${placement===1?"1st":placement===2?"2nd":placement===3?"3rd":placement===4?"4th":placement===5?"5th":"6th"}! (+${expGain} EXP total${sources.length? " — "+sources.join(", "):""})`
    : `❌ ${h.name} did not place in ${discipline} (${difficulty}).` + (injured? ` They picked up a minor injury during the run (out ${h.statusDays} days).` : "") + ` (+${expGain} EXP total${sources.length? " — "+sources.join(", "):""})`;
  addLog(resultMsg);
  const compEntry = {
    day: state.day, type: "competition", label: `${discipline} (${difficulty})`,
    art: artType || null, lit: litWordCount ? `Literature (${litWordCount} words)` : null, bonuses: bonusKeys||[],
    exp: expGain, link: link || null, placement: success ? placement : null,
  };
  h.artLog.unshift(compEntry);
  saveArtEntry(h, compEntry);
  save();
  render();
  return {success, placement, injured, successChance, roll, avg, expGain};
}

function deleteHorse(id){
  if(!confirm('Remove this horse from your roster? This cannot be undone.')) return;
  const h = state.horses.find(x=>x.id===id);
  state.horses = state.horses.filter(x=>x.id!==id);
  if(h) addLog(`${h.name} has left the stable roster.`);
  if(bankAccount.linked && STABLE_URL){
    stableGas({action:'deleteHorse', userId:bankAccount.userId, horseId:id});
  }
  save();
  render();
}

function toggleEvents(id){
  const h = state.horses.find(x=>x.id===id);

  h.eventsEnabled = !(h.eventsEnabled !== false); // flip, treating undefined as true
  addLog(`🛡️ Health risk events ${h.eventsEnabled ? "re-enabled" : "disabled"} for ${h.name}.`);
  save();
  render();
}

  const COND_LABELS = {blind:"👁️ Blind",deaf:"👂 Deaf",asthma:"💨 Asthma",cushings:"🧪 Cushing's",kissingSpine:"🦴 Kissing Spine",suspensory:"⚠️ Prior Suspensory"};
  const activeConds = Object.entries(h.conditions||{}).filter(([k,v])=>v===true && COND_LABELS[k]);
  const pastInj = (h.conditions?.pastInjuries||[]);
  // Active conditions from new engine
  const ac = h.activeConditions || {};
  const PROG_LABELS = ["Mild","Moderate","Severe","Critical"];
  const chronicTags = Object.entries(ac).filter(([,v])=>v.active).map(([id,entry])=>{
    const def = CONDITIONS[id];
    if(!def) return "";
    const prog = def.severity==="chronic"||entry.progressionLevel>0 ? ` (${PROG_LABELS[entry.progressionLevel||0]})` : "";
    return `<span class="tag" style="background:#4a1a1a;color:#e8a0a0;border-color:${def.color||'#8a3a3a'};font-size:.75em;">${def.icon} ${def.name}${prog}</span>`;
  });
  // Upcoming care warnings from new engine
  const careWarnings = [];
  Object.entries(ac).forEach(([id,entry])=>{
    if(!entry.active || !entry.nextDueDay) return;
    const def = CONDITIONS[id];
    const daysLeft = entry.nextDueDay - state.day;
    if(daysLeft <= 14){
      const label = def?.recurringCare?.type === "osphos" ? "OSPHOS" : "Adequan";
      careWarnings.push(`💊 ${label} due Day ${entry.nextDueDay} (in ${daysLeft}d)`);
    }
  });
  if(h.farrierCare?.nextDueDay && h.farrierCare.nextDueDay - state.day <= 5)
    careWarnings.push(`🪝 Farrier due Day ${h.farrierCare.nextDueDay} (in ${h.farrierCare.nextDueDay-state.day}d)`);
  if(h.vetCare?.lastVaccineDay && state.day - h.vetCare.lastVaccineDay >= 165)
    careWarnings.push(`💉 Vaccines due soon`);
  const condHtml = (activeConds.length || pastInj.length || chronicTags.length || careWarnings.length) ? `
    <div style="margin-top:6px;">
      <div class="small" style="color:var(--warn);font-weight:bold;margin-bottom:3px;">⚕️ Health & Care</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        ${activeConds.map(([k])=>`<span class="tag" style="background:#4a1a1a;color:#e8a0a0;border-color:#8a3a3a;font-size:.75em;">${COND_LABELS[k]}</span>`).join("")}
        ${chronicTags.join("")}
        ${pastInj.map(p=>`<span class="tag" style="background:#3a2a1a;color:#d4a87a;border-color:#7a5a3a;font-size:.75em;">📌 ${p}</span>`).join("")}
      </div>
      ${activeConds.length||chronicTags.length ? `<div class="small" style="margin-top:3px;color:var(--dim);">Injury likelihood: ×${conditionInjuryModifier(h).toFixed(2)}</div>` : ""}
      ${careWarnings.length ? `<div style="margin-top:4px;">${careWarnings.map(w=>`<div class="small" style="color:var(--warn);">⚠️ ${w}</div>`).join("")}</div>` : ""}
    </div>` : "";

  // Tack
  const tackParts = [];
  if(h.tack?.saddle) tackParts.push(`Saddle: ${h.tack.saddle}`);
  if(h.tack?.bridle) tackParts.push(`Bridle: ${h.tack.bridle}`);
  if(h.tack?.shoes)  tackParts.push(`Shoes: ${h.tack.shoes}`);
  if(h.tack?.other)  tackParts.push(h.tack.other);
  const tackBonusHtml = (h.tack?.bonuses||[]).length ? `<span style="color:var(--accent);"> (+${h.tack.bonuses.join(", ")})</span>` : "";
  const tackHtml = tackParts.length
    ? `<div style="margin-top:6px;" class="small">🏇 <b>Tack:</b> ${tackParts.join(" · ")}${tackBonusHtml}</div>`
    : `<div style="margin-top:6px;" class="small" style="color:var(--dim);">🏇 No tack recorded.</div>`;

  return `
  <div class="horse-card">
    <div class="horse-top-row">
      <div class="horse-photo-wrap">
        ${photoHtml}
        <input type="file" accept="image/*" data-photo-input="${h.id}" style="display:none;" />
        <button class="secondary" data-act="upload-photo" data-id="${h.id}" style="margin-top:4px;font-size:.75em;padding:4px 8px;">📷 ${h.profileImage?'Change':'Upload'}</button>
      </div>
      <div style="flex:1;">
        <div class="horse-head">
          <div><span class="name">${h.name}</span> ${statusTag} ${shieldTag} <span class="tag">Lvl ${h.level}</span></div>
          <div class="small">${h.breed}${h.gender?' · '+h.gender:''} · Age ${h.age}${h.birthYear?' (b.'+h.birthYear+')':''} (${h.stage})</div>
          ${h.agingEnabled===false
            ? '<div class="small" style="color:var(--dim);">🎂 Auto-aging disabled — age will not change unless re-enabled.</div>'
            : `<div class="small" style="color:var(--dim);">🎂 Next birthday: Day ${(h.joinedOnDay||1) + (Math.floor((state.day-(h.joinedOnDay||1))/365)+1)*365} (in ${((h.joinedOnDay||1) + (Math.floor((state.day-(h.joinedOnDay||1))/365)+1)*365) - state.day} days)</div>`
          }
        </div>
        <div class="small">EXP: ${h.exp} / ${h.level<10?LEVEL_TABLE[h.level+1].exp:LEVEL_TABLE[10].exp+' (max)'}</div>
        <div class="expbar-bg"><div class="expbar-fill" style="width:${pct}%"></div></div>
        ${infoHtml}
      </div>
    </div>
    ${statBarsHTML(h)}
    ${condHtml}
    ${tackHtml}
    <div class="small" style="margin-top:8px;">Breeding Slots:</div>
    <div class="breedslots">${slots}</div>

    <div class="row" style="margin-top:8px;gap:6px;flex-wrap:wrap;">
      <button class="secondary" data-act="toggle-events" data-id="${h.id}">${h.eventsEnabled===false?'🛡️ Re-enable health risk':'🛡️ Disable health risk'}</button>
      <button class="secondary" data-act="toggle-aging" data-id="${h.id}">${h.agingEnabled===false?'🎂 Re-enable auto-aging':'🎂 Disable auto-aging'}</button>
      <button class="secondary" data-act="toggle-artlog" data-id="${h.id}">📖 ${artLogOpen?'Hide':'Show'} Art Log (${h.artLog.length})</button>
      <button class="secondary" data-act="edit-horse" data-id="${h.id}">✏️ Edit Info</button>
      <button class="secondary" data-act="upload-ref" data-id="${h.id}">📋 ${h.referenceImage?'Change':'Upload'} Ref Sheet</button>
      <input type="file" accept="image/*" data-ref-input="${h.id}" style="display:none;" />
      <button class="secondary" data-act="edit-conditions" data-id="${h.id}">⚕️ Conditions</button>
      <button class="secondary" data-act="edit-tack" data-id="${h.id}">🏇 Tack</button>
      <button class="secondary danger" data-act="del" data-id="${h.id}">Remove</button>
    </div>
    ${refImgHtml}
    ${artLogHtml}
  </div>`;
}

function showModal(title, bodyHtml, onSave){
  document.getElementById('modal-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `<div style="background:var(--panel);border:1px solid #4a392a;border-radius:10px;padding:20px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;">
    <h3 style="margin-top:0;color:var(--accent);">${title}</h3>
    ${bodyHtml}
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="modal-save" style="flex:1;">💾 Save</button>
      <button id="modal-cancel" class="secondary" style="flex:none;">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-cancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#modal-save').onclick = ()=>{ onSave(overlay); overlay.remove(); };
}

function showConditionsModal(id){
  const h = state.horses.find(x=>x.id===id);
  if(!h) return;
  if(!h.conditions) h.conditions = {};
  const c = h.conditions;
  const CONDS = [
    {k:"blind",      label:"👁️ Blind",            note:"Increases injury likelihood by 15%"},
    {k:"deaf",       label:"👂 Deaf",              note:"Cosmetic — affects story beats"},
    {k:"asthma",     label:"💨 Asthma",            note:"Increases injury likelihood by 10%"},
    {k:"cushings",   label:"🧪 Cushing's Disease", note:"Increases injury likelihood by 20%"},
    {k:"kissingSpine",label:"🦴 Kissing Spine",    note:"Increases injury likelihood by 25%"},
    {k:"suspensory", label:"⚠️ Prior Suspensory",  note:"Increases injury likelihood by 40% — compounds on reinjury"},
  ];
  const pastInj = (c.pastInjuries||[]).join(", ");
  showModal('⚕️ Health Conditions — ' + h.name, `
    <p class="small" style="color:var(--dim);margin-top:0;">All conditions are optional. Active conditions increase injury probability. Degenerative conditions (Cushing's, Kissing Spine) are permanent once checked.</p>
    ${CONDS.map(cd=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px;background:#15100c;border-radius:6px;">
        <input type="checkbox" id="cd_${cd.k}" ${c[cd.k]?"checked":""} style="width:auto;flex:none;" />
        <div><label for="cd_${cd.k}" style="font-weight:bold;cursor:pointer;">${cd.label}</label>
        <div class="small" style="color:var(--dim);">${cd.note}</div></div>
      </div>`).join("")}
    <div style="margin-top:10px;"><label>Past Injuries <span class="small">(comma-separated, e.g. "Bowed tendon 2023, Hock chip 2024")</span></label>
    <input id="cd_pastinj" value="${pastInj}" placeholder="e.g. Bowed tendon, RF chip" /></div>
    <div id="cd_modifier" class="small" style="margin-top:8px;color:var(--warn);"></div>
  `, (overlay)=>{
    CONDS.forEach(cd=>{ c[cd.k] = overlay.querySelector('#cd_'+cd.k).checked; });
    const raw = overlay.querySelector('#cd_pastinj').value.trim();
    c.pastInjuries = raw ? raw.split(",").map(s=>s.trim()).filter(Boolean) : [];
    saveHorse(h); save(); render();
  });
  // Live modifier preview
  setTimeout(()=>{
    const preview = document.querySelector('#cd_modifier');
    if(!preview) return;
    function updatePreview(){
      const tempC = {};
      CONDS.forEach(cd=>{ tempC[cd.k] = document.querySelector('#cd_'+cd.k)?.checked||false; });
      const rawPast = document.querySelector('#cd_pastinj')?.value.trim()||'';
      tempC.pastInjuries = rawPast ? rawPast.split(",").filter(Boolean) : [];
      const tempH = {...h, conditions: tempC};
      const mod = conditionInjuryModifier(tempH);
      preview.textContent = mod > 1 ? `Current injury likelihood modifier: ×${mod.toFixed(2)}` : '';
    }
    CONDS.forEach(cd=> document.querySelector('#cd_'+cd.k)?.addEventListener('change', updatePreview));
    document.querySelector('#cd_pastinj')?.addEventListener('input', updatePreview);
    updatePreview();
  }, 50);
}

function renderVetFarrier(){
  const wrap = el('div');
  if(state.horses.length === 0){ wrap.appendChild(el('div','empty-msg','Add a horse first on the Stable Roster tab.')); return wrap; }

  // ---- ROUTINE SHOTS ----
  const vaccCard = el('div','card');
  vaccCard.innerHTML = `
    <h3>💉 Routine Vaccinations</h3>
    <p class="small" style="color:var(--dim);margin-top:0;">Give all horses their annual shots. Reduces illness chance by ~60% for the next 365 days. All horses take the next day off — no training or competition.</p>
    <div id="vacc_list">
      ${state.horses.filter(h=>h.status!=="deceased").map(h=>{
        const fc = h.vetCare||{};
        const daysSince = fc.lastVaccineDay ? state.day - fc.lastVaccineDay : null;
        const due = !fc.lastVaccineDay || daysSince >= 350;
        const status = fc.lastVaccineDay
          ? (fc.vaccineProtected ? `✅ Protected · last vaccinated Day ${fc.lastVaccineDay} (${daysSince}d ago)` : `⚠️ Protection expired — due for booster`)
          : `❌ Never vaccinated`;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px;background:#15100c;border-radius:6px;margin-bottom:6px;">
          <div><b>${h.name}</b> <span class="small">${status}</span></div>
          ${due ? `<button class="secondary" data-act="vaccinate" data-id="${h.id}" style="margin:0;font-size:.8em;padding:5px 10px;">💉 Vaccinate</button>` : `<span class="small" style="color:var(--good);">Up to date</span>`}
        </div>`;
      }).join("")}
    </div>
    <button id="vacc_all" style="margin-top:8px;">💉 Vaccinate All Due Horses</button>
    <div id="vacc_result" style="margin-top:6px;"></div>
  `;
  wrap.appendChild(vaccCard);

  vaccCard.querySelector('#vacc_all').onclick = ()=>{
    const due = state.horses.filter(h=>h.status!=="deceased" && (!h.vetCare?.lastVaccineDay || state.day - h.vetCare.lastVaccineDay >= 350));
    if(!due.length){ vaccCard.querySelector('#vacc_result').innerHTML='<div class="result success">All horses are up to date!</div>'; return; }
    due.forEach(h=>doVaccinate(h));
    vaccCard.querySelector('#vacc_result').innerHTML=`<div class="result success">💉 ${due.map(h=>h.name).join(", ")} vaccinated! All take tomorrow off.</div>`;
    save(); render();
  };
  vaccCard.querySelectorAll('[data-act="vaccinate"]').forEach(b=>{
    b.onclick = ()=>{
      const h = state.horses.find(x=>x.id===b.dataset.id);
      if(h){ doVaccinate(h); save(); render(); }
    };
  });

  // ---- FARRIER ----
  const farrCard = el('div','card');
  farrCard.innerHTML = `
    <h3>🪝 Farrier Visits</h3>
    <p class="small" style="color:var(--dim);margin-top:0;">Schedule every 45 days. The farrier will reshoe and may discover hoof issues. Existing hoof problems can also be treated.</p>
    <div id="farr_list">
      ${state.horses.filter(h=>h.status!=="deceased").map(h=>{
        const fc = h.farrierCare||{};
        const daysSince = fc.lastVisitDay ? state.day - fc.lastVisitDay : null;
        const due = !fc.lastVisitDay || daysSince >= 45;
        const issues = (fc.hoofIssues||[]);
        const statusStr = fc.lastVisitDay
          ? (due ? `⚠️ OVERDUE — last visit Day ${fc.lastVisitDay} (${daysSince}d ago)` : `✅ Last visit Day ${fc.lastVisitDay} · Next due Day ${fc.nextDueDay}`)
          : `❌ No farrier visit on record`;
        return `<div style="padding:8px;background:#15100c;border-radius:6px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div><b>${h.name}</b><br><span class="small">${statusStr}</span>
            ${issues.length ? `<div class="small" style="color:var(--warn);margin-top:2px;">🪝 Known issues: ${issues.join(", ")}</div>` : ""}
            </div>
            <button class="secondary" data-act="farrier" data-id="${h.id}" style="margin:0;font-size:.8em;padding:5px 10px;"${!due&&!issues.length?' disabled':''}>🪝 ${due?"Schedule Visit":"Treat Issues"}</button>
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
  wrap.appendChild(farrCard);

  farrCard.querySelectorAll('[data-act="farrier"]').forEach(b=>{
    b.onclick = ()=>{
      const h = state.horses.find(x=>x.id===b.dataset.id);
      if(h) showFarrierModal(h, farrCard);
    };
  });

  // ---- TREATMENT (sick/injured horses) ----
  const sickHorses = state.horses.filter(h=>h.status==="sick"||h.status==="injured");
  if(sickHorses.length){
    const treatCard = el('div','card');
    treatCard.innerHTML = `
      <h3>⚕️ Treatment Care</h3>
      <p class="small" style="color:var(--dim);margin-top:0;">Log treatment sessions for sick or injured horses. Attach art or writing for full EXP + bonus Harmony — it builds trust during recovery.</p>
      ${sickHorses.map(h=>{
        const activeConds = Object.entries(h.activeConditions||{}).filter(([,v])=>v.active).map(([id])=>CONDITIONS[id]?.name||id);
        return `
        <div style="padding:10px;background:#15100c;border-radius:6px;margin-bottom:10px;">
          <div style="margin-bottom:6px;"><b>${h.name}</b> <span class="tag ${h.status}">${h.status} · ${h.statusDays}d left</span>
          ${activeConds.length?`<span class="small" style="color:var(--dim);"> — ${activeConds.join(", ")}</span>`:""}
          </div>
          <div style="margin-bottom:6px;"><label>Treatment Type</label>
            <select data-treat-type="${h.id}">
              ${TREATMENT_ACTIONS.map(t=>`<option value="${t.id}">${t.label} (+${t.exp} EXP, +${t.bond} Bond)</option>`).join("")}
            </select>
          </div>
          <div class="row">
            <div><label>Art logged? (optional)</label>
              <select data-treat-art="${h.id}">
                <option value="">No art this time</option>
                ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
              </select>
            </div>
            <div><label>Literature word count (optional)</label>
              <input type="number" data-treat-lit="${h.id}" min="0" placeholder="min 200 for EXP" />
            </div>
          </div>
          <div style="margin-top:6px;"><label>Link to art/writing (optional)</label>
            <input type="text" data-treat-link="${h.id}" placeholder="https://…" />
          </div>
          <button data-act="log-treatment" data-id="${h.id}" style="margin-top:8px;font-size:.85em;">💊 Log Treatment Session</button>
          <div data-treat-result="${h.id}" style="margin-top:4px;"></div>
        </div>`;}).join("")}
    `;
    wrap.appendChild(treatCard);

    treatCard.querySelectorAll('[data-act="log-treatment"]').forEach(b=>{
      b.onclick = ()=>{
        const h = state.horses.find(x=>x.id===b.dataset.id);
        if(!h) return;
        const treatTypeId = treatCard.querySelector(`[data-treat-type="${h.id}"]`).value;
        const treatDef    = TREATMENT_ACTIONS.find(t=>t.id===treatTypeId) || TREATMENT_ACTIONS[0];
        const artType     = treatCard.querySelector(`[data-treat-art="${h.id}"]`).value;
        const litWords    = parseInt(treatCard.querySelector(`[data-treat-lit="${h.id}"]`).value)||0;
        const link        = treatCard.querySelector(`[data-treat-link="${h.id}"]`).value.trim();
        const res         = treatCard.querySelector(`[data-treat-result="${h.id}"]`);
        const hasArt      = !!(artType || litWords >= 200);
        let expGain = 0, bondGain = 0;
        const sources = [];
        if(hasArt){
          // Treatment base rewards (only with art)
          expGain += treatDef.exp; bondGain += treatDef.bond;
          sources.push(`${treatDef.label} (+${treatDef.exp} EXP, +${treatDef.bond} Bond)`);
          if(artType && ART_EXP[artType]){
            expGain += ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`);
          }
          const litExp = calcLitExp(litWords);
          if(litExp > 0){ expGain += litExp; sources.push(`Literature (${litWords} words) (+${litExp})`); }
        }
        h.exp += expGain;
        h.stats.harmony = (h.stats.harmony||0) + bondGain;
        checkLevelUp(h);
        const entry = {
          day: state.day, type:"treatment",
          label: `${treatDef.label} (${h.status})`,
          art: artType||null, lit: litWords?`Literature (${litWords} words)`:null,
          bonuses:[], exp:expGain, link:link||null,
        };
        h.artLog.unshift(entry);
        if(hasArt) saveArtEntry(h, entry);
        addLog(`💊 ${h.name} — ${treatDef.label}${hasArt?` (+${expGain} EXP, +${bondGain} Harmony)`:""}.`);
        saveHorse(h); save();
        res.innerHTML = `<div class="result success">✅ ${treatDef.label} logged!${hasArt?` +${expGain} EXP, +${bondGain} Harmony`:""} ${!hasArt?'(No EXP without art — add a drawing or story to earn rewards!)':''}</div>`;
      };
    });
  }

  // ---- CONDITION MANAGEMENT (data-driven) ----
  const condHorses = state.horses.filter(h=> h.activeConditions && Object.values(h.activeConditions).some(c=>c.active));
  if(condHorses.length){
    const chronCard = el('div','card');
    let chronHtml = `<h3>🏥 Active Condition Management</h3><p class="small" style="color:var(--dim);margin-top:0;">Manage recurring care, therapeutic requirements, and restrictions for horses with active conditions.</p>`;
    condHorses.forEach(h=>{
      const ac = h.activeConditions;
      const activeList = Object.entries(ac).filter(([,v])=>v.active);
      if(!activeList.length) return;
      chronHtml += `<div style="padding:10px;background:#15100c;border-radius:6px;margin-bottom:12px;">
        <div style="font-weight:bold;margin-bottom:6px;">${h.name}</div>`;
      activeList.forEach(([id, entry])=>{
        const def = CONDITIONS[id];
        if(!def) return;
        const PROG_LABELS = ["Mild","Moderate","Severe","Critical"];
        const prog = PROG_LABELS[entry.progressionLevel||0];
        chronHtml += `<div style="margin-bottom:8px;padding:6px;background:#1b1410;border-radius:5px;border-left:3px solid ${def.color||'#4a392a'};">
          <div style="font-size:.85em;font-weight:bold;color:#e8c0a0;">${def.icon} ${def.name} <span style="color:var(--dim);font-weight:normal;">(${prog})</span></div>`;
        // Recurring care button
        if(def.recurringCare){
          const label = def.recurringCare.type === "osphos" ? "OSPHOS" : "Adequan";
          const due = entry.nextDueDay;
          const overdue = due && state.day >= due;
          const dueStr = due ? (overdue ? `⚠️ OVERDUE (Day ${due})` : `Day ${due} (in ${due-state.day}d)`) : "Not yet scheduled";
          chronHtml += `<div class="small" style="margin:3px 0;">Next ${label}: ${dueStr} · Missed doses: ${entry.missedDoses||0} · Care streak: ${entry.careStreak||0}</div>
            <button data-act="give-injection" data-id="${h.id}" data-cond="${id}" class="secondary" style="font-size:.78em;padding:4px 8px;margin-top:2px;">💉 Administer ${label}</button>`;
        }
        // Laminitis-specific toggles
        if(id === "laminitis"){
          chronHtml += `<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
            <button data-act="toggle-dry-paddock" data-id="${h.id}" class="secondary" style="font-size:.78em;padding:4px 8px;">${entry.dryPaddock?"🌿 Return to Pasture ⚠️":"🏠 Enforce Dry Paddock"}</button>
            <button data-act="toggle-strict-diet" data-id="${h.id}" class="secondary" style="font-size:.78em;padding:4px 8px;">${entry.strictDiet?"🌾 Relax Diet":"🌾 Enforce Strict Diet"}</button>
          </div>
          <div class="small" style="margin-top:3px;color:var(--dim);">Dry paddock: ${entry.dryPaddock?"✅":"❌"} · Strict diet: ${entry.strictDiet?"✅":"❌"} · Shoes: ${entry.shoesFitted?"✅":"❌"}</div>`;
        }
        // Navicular shoes
        if(id === "navicular"){
          chronHtml += `<div class="small" style="margin-top:3px;color:var(--dim);">Egg-bar shoes fitted: ${entry.shoesFitted?"✅":"❌ — schedule a farrier visit to fit therapeutic shoes"}</div>`;
        }
        // Restrictions
        if(def.restrictions?.length || def.permanentRestrictions?.length){
          const restr = [...(def.restrictions||[]),...(def.permanentRestrictions||[])];
          chronHtml += `<div class="small" style="margin-top:3px;color:var(--warn);">🚫 ${restr.join(" · ")}</div>`;
        }
        chronHtml += `</div>`;
      });
      chronHtml += `</div>`;
    });
    chronCard.innerHTML = chronHtml;
    wrap.appendChild(chronCard);

    chronCard.querySelectorAll('[data-act="give-injection"]').forEach(b=>{
      b.onclick = ()=>{
        const h = state.horses.find(x=>x.id===b.dataset.id);
        const condId = b.dataset.cond;
        if(!h || !h.activeConditions?.[condId]) return;
        const def = CONDITIONS[condId];
        const entry = h.activeConditions[condId];
        const rc = def.recurringCare;
        const label = rc.type === "osphos" ? "OSPHOS" : "Adequan";
        entry.nextDueDay = state.day + rc.intervalDays;
        entry.missedDoses = 0;
        entry.careStreak = (entry.careStreak||0) + 1;
        addLog(`💉 ${h.name} received their ${label} injection. Next dose due Day ${entry.nextDueDay} (in ${rc.intervalDays} days).`);
        saveHorse(h); save(); render();
      };
    });
    chronCard.querySelectorAll('[data-act="toggle-dry-paddock"]').forEach(b=>{
      b.onclick = ()=>{
        const h = state.horses.find(x=>x.id===b.dataset.id);
        if(!h?.activeConditions?.laminitis) return;
        const entry = h.activeConditions.laminitis;
        if(entry.dryPaddock){
          if(!confirm(`⚠️ WARNING: Returning ${h.name} to pasture with active laminitis risks catastrophic worsening. Are you sure?`)) return;
        }
        entry.dryPaddock = !entry.dryPaddock;
        addLog(`🏠 ${h.name} is now ${entry.dryPaddock?"in a dry paddock (no grass access)":"returned to pasture — monitor closely!"}`);
        saveHorse(h); save(); render();
      };
    });
    chronCard.querySelectorAll('[data-act="toggle-strict-diet"]').forEach(b=>{
      b.onclick = ()=>{
        const h = state.horses.find(x=>x.id===b.dataset.id);
        if(!h?.activeConditions?.laminitis) return;
        const entry = h.activeConditions.laminitis;
        entry.strictDiet = !entry.strictDiet;
        addLog(`🌾 ${h.name} is now on a ${entry.strictDiet?"strict timothy-only diet (no alfalfa, no sugary treats, low-carb)":"relaxed diet — monitor for flares!"}`);
        saveHorse(h); save(); render();
      };
    });
  }

  return wrap;
}

function doVaccinate(h){
  if(!h.vetCare) h.vetCare = {};
  h.vetCare.lastVaccineDay = state.day;
  h.vetCare.vaccineProtected = true;
  h.vetCare._vaccineReminded = false;
  // Force a rest day tomorrow — mark as resting
  if(h.status === "healthy"){ h.status = "sick"; h.statusDays = 1; }
  addLog(`💉 ${h.name} received their routine vaccinations on Day ${state.day}. They'll need tomorrow off to rest.`);
}

function showFarrierModal(h, container){
  const fc = h.farrierCare || {};
  const issues = fc.hoofIssues||[];
  showModal(`🪝 Farrier Visit — ${h.name}`, `
    <p class="small" style="color:var(--dim);margin-top:0;">The farrier will reshoe ${h.name} and check for hoof issues. There's a chance they discover something new.</p>
    ${h.chronicCare?.navicular && !h.chronicCare?.navicularShoes ? `<div class="result fail" style="margin-bottom:8px;">⚠️ Navicular diagnosed — farrier should fit egg-bar shoes with wedge pads.</div>` : ""}
    ${h.chronicCare?.laminitis && !h.chronicCare?.laminitisShoes ? `<div class="result fail" style="margin-bottom:8px;">⚠️ Laminitis diagnosed — farrier should fit therapeutic heel-lift shoes.</div>` : ""}
    ${issues.length ? `<div class="small" style="color:var(--warn);margin-bottom:8px;">🪝 Known issues to treat: ${issues.join(", ")}</div>` : ""}
    <label>Shoe type (optional)</label>
    <select id="farr_shoes">
      <option value="">Standard shoes</option>
      <option value="Egg-bar + wedge (navicular)">Egg-bar + wedge (navicular)</option>
      <option value="Heel-lift therapeutic (laminitis)">Heel-lift therapeutic (laminitis)</option>
      <option value="Barefoot trim">Barefoot trim</option>
      <option value="Front shoes only">Front shoes only</option>
      <option value="Full set">Full set</option>
      <option value="Glue-on shoes">Glue-on shoes</option>
    </select>
    <div style="margin-top:8px;"><label>Notes (optional)</label><input id="farr_notes" placeholder="e.g. Treated thrush, packed sole" /></div>
  `, (overlay)=>{
    if(!h.farrierCare) h.farrierCare = {hoofIssues:[]};
    h.farrierCare.lastVisitDay = state.day;
    h.farrierCare.nextDueDay   = state.day + 45;
    h.farrierCare._reminded    = false;
    const shoes = overlay.querySelector('#farr_shoes').value;
    const notes = overlay.querySelector('#farr_notes').value.trim();
    if(shoes){ if(!h.tack) h.tack={};  h.tack.shoes = shoes; }
    // Fit special shoes for conditions
    if(shoes.includes("navicular")) h.chronicCare.navicularShoes = true;
    if(shoes.includes("laminitis")) h.chronicCare.laminitisShoes = true;
    // RNG hoof issue discovery
    let discovered = "";
    if(Math.random() < 0.25){
      const issue = pick(HOOF_ISSUES.filter(i=>!h.farrierCare.hoofIssues.includes(i)));
      if(issue){ h.farrierCare.hoofIssues.push(issue); discovered = ` Discovered: ${issue}.`; }
    } else if(h.farrierCare.hoofIssues.length && Math.random() < 0.5){
      const treated = h.farrierCare.hoofIssues.shift();
      discovered = ` Treated and cleared: ${treated}.`;
    }
    addLog(`🪝 Farrier visited ${h.name} on Day ${state.day}. ${shoes?`Shoes: ${shoes}.`:"Reshod as normal."} Next visit due Day ${h.farrierCare.nextDueDay}.${discovered}${notes?" Note: "+notes:""}` );
    saveHorse(h); save(); render();
  });
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML = '<div style="padding:20px; color:var(--dim);">Loading…</div>'; return; }
  if(!bankAccount.linked){
    renderLoginScreen();
    return;
  }
  app.innerHTML = `
    <h1>🐴 EquiStories Stable Manager</h1>
    <div class="daybox">
      <div>Welcome back. <span class="small">${state.horses.length} horse(s) in the stable.</span></div>
      <div><span class="day">${todayLabel(state.day)}</span></div>
    </div>
    <div class="tabs">
      ${["roster","train","compete","vet","log","bank"].map(t=>`<div class="tab ${activeTab===t?'active':''}" data-tab="${t}">${t==='roster'?'Stable Roster':t==='train'?'Training':t==='compete'?'Competitions':t==='vet'?'🩺 Vet & Farrier':t==='bank'?'💰 Bank':'Day Log'}</div>`).join("")}
      <div style="flex:1"></div>
      <button data-act="nextday" style="margin-top:0;">⏭ Advance Day</button>
    </div>
    <div id="tabcontent"></div>
  `;
  const content = document.getElementById('tabcontent');

  if(activeTab === "roster"){
    content.appendChild(renderRoster());
  } else if(activeTab === "train"){
    content.appendChild(renderTraining());
  } else if(activeTab === "compete"){
    content.appendChild(renderCompete());
  } else if(activeTab === "log"){
    content.appendChild(renderLog());
  } else if(activeTab === "vet"){
    content.appendChild(renderVetFarrier());
  } else if(activeTab === "bank"){
    renderBank(content);
  }

  app.querySelectorAll('[data-tab]').forEach(t=> t.onclick = ()=>{ activeTab = t.dataset.tab; render(); });
  const nd = app.querySelector('[data-act="nextday"]');
  if(nd) nd.onclick = ()=>{ advanceDay(); activeTab = "log"; render(); };
  app.querySelectorAll('[data-act="del"]').forEach(b=> b.onclick = ()=> deleteHorse(b.dataset.id));
  app.querySelectorAll('[data-act="toggle-events"]').forEach(b=> b.onclick = ()=> toggleEvents(b.dataset.id));
  app.querySelectorAll('[data-act="toggle-aging"]').forEach(b=>{
    b.onclick = ()=>{
      const h = state.horses.find(x=>x.id===b.dataset.id);
      if(!h) return;
      h.agingEnabled = h.agingEnabled === false ? true : false;
      addLog(`🎂 Auto-aging ${h.agingEnabled ? 're-enabled' : 'disabled'} for ${h.name}.${h.agingEnabled ? ' They will age up every 365 days from Day '+(h.joinedOnDay||1)+'.' : ' Their age will stay frozen until re-enabled.'}`);
      saveHorse(h); save(); render();
    };
  });
  app.querySelectorAll('[data-act="toggle-artlog"]').forEach(b=> b.onclick = ()=>{
    const id = b.dataset.id;
    if(expandedArtLogs.has(id)) expandedArtLogs.delete(id); else expandedArtLogs.add(id);
    render();
  });

  app.querySelectorAll('[data-act="edit-horse"]').forEach(b=> b.onclick = ()=> showEditHorseModal(b.dataset.id));
  app.querySelectorAll('[data-act="edit-conditions"]').forEach(b=> b.onclick = ()=> showConditionsModal(b.dataset.id));
  app.querySelectorAll('[data-act="edit-tack"]').forEach(b=> b.onclick = ()=> showTackModal(b.dataset.id));
  app.querySelectorAll('[data-act="upload-photo"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-photo-input="${b.dataset.id}"]`);
      if(input) input.click();
    };
  });
  app.querySelectorAll('[data-photo-input]').forEach(inp=>{
    inp.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const h = state.horses.find(x=>x.id===inp.dataset.photoInput);
        if(h){ h.profileImage = reader.result; save(); render(); }
      };
      reader.readAsDataURL(file);
    };
  });
  app.querySelectorAll('[data-act="save-ref-link"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-ref-link-input="${b.dataset.id}"]`);
      const h = state.horses.find(x=>x.id===b.dataset.id);
      if(h && input){ h.referenceLink = input.value.trim() || null; save(); render(); }
    };
  });
  app.querySelectorAll('[data-act="upload-ref"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-ref-input="${b.dataset.id}"]`);
      if(input) input.click();
    };
  });
  app.querySelectorAll('[data-ref-input]').forEach(inp=>{
    inp.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const h = state.horses.find(x=>x.id===inp.dataset.refInput);
        if(h){
          h.referenceImage = reader.result;
          if(!h.referenceExpLogged){
            h.referenceExpLogged = true;
            h.exp += 4;
            checkLevelUp(h);
            addLog(`📋 ${h.name}'s Registration / Reference Sheet uploaded — +4 EXP awarded!`);
          }
          save(); render();
        }
      };
      reader.readAsDataURL(file);
    };
  });
}

    <span class="small">Health risk: uncheck to protect from illness, injury, and fatal events. Aging: uncheck to freeze age — horse will only age when you manually re-enable it.</span>
    <br><button id="nh_add">Add to Stable</button>
  `);
  wrap.appendChild(form);

    const name  = wrap.querySelector('#nh_name').value.trim();
    const age   = wrap.querySelector('#nh_age').value;
    const breed = wrap.querySelector('#nh_breed').value.trim() || "Unspecified";
    const eventsEnabled = wrap.querySelector('#nh_events').checked;
    const agingEnabled  = wrap.querySelector('#nh_aging').checked;
    const gender    = wrap.querySelector('#nh_gender').value;
    const color     = wrap.querySelector('#nh_color').value.trim();
    const geno      = wrap.querySelector('#nh_geno').value.trim();
    const traits    = wrap.querySelector('#nh_traits').value.trim();
    const mutations = wrap.querySelector('#nh_mutations').value.trim();
    const birthYear = wrap.querySelector('#nh_birthyear').value ? Number(wrap.querySelector('#nh_birthyear').value) : null;
    if(!name){ alert("Give your horse a name first!"); return; }
    const h = newHorse({name, age, breed, eventsEnabled, agingEnabled, gender, color, geno, traits, mutations, birthYear});
    state.horses.push(h);
    addLog(`🐎 ${h.name} (${h.gender||breed}) has joined the stable at age ${h.age}.` + (!eventsEnabled ? ` (Health risk events disabled.)` : ""));

    list.appendChild(el('div','empty-msg','No horses yet — add your first one above!'));
  } else {
    state.horses.forEach(h=> list.insertAdjacentHTML('beforeend', horseCardHTML(h)));
  }

  return wrap;
}

function renderTraining(){
  const wrap = el('div');
  if(state.horses.length===0){ wrap.appendChild(el('div','empty-msg','Add a horse first on the Stable Roster tab.')); return wrap; }

  const trainingOpts = TRAININGS.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
  const card = el('div','card');
  card.innerHTML = `
    <h3>Train a Horse</h3>
    <div class="row">
      <div>
        <label>Horse</label>
        <select id="tr_horse">${state.horses.filter(h=>h.status!=="deceased").map(h=>`<option value="${h.id}" ${h.status!=="healthy"?"disabled":""}>${h.name} (${h.status}${h.status!=="healthy" && h.status!=="retired" ? ` · ${h.statusDays}d left`:""})</option>`).join("")}</select>

const PLACEMENT_BUXX_AMOUNTS = {1:1000, 2:750, 3:500, 4:250, 5:100, 6:50};

// Google Apps Script requires requests sent as plain text with JSON stringified in the body,
// AND the script must be deployed with "Anyone" access. We use a script-tag JSONP trick for GETs
// and a form POST via hidden iframe for POSTs to avoid CORS preflight blocks.

function gasPost(payload){
  return new Promise((resolve) => {
    const callbackName = 'gasCb_' + Date.now();
    // Encode payload as a URL param so GAS can read it via e.parameter.data
    const url = BANK_URL + '?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(payload));
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true;
      delete window[callbackName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; document.head.removeChild(script); resolve({success:false,error:'Network error'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out'}); } }, 12000);
    script.src = url;
    document.head.appendChild(script);
  });
}

function gasGet(params){
  return new Promise((resolve) => {
    const callbackName = 'gasCb_' + Date.now();
    const qs = Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const url = BANK_URL + '?' + qs + '&callback=' + callbackName;
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true;
      delete window[callbackName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; document.head.removeChild(script); resolve({success:false,error:'Network error'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out'}); } }, 12000);
    script.src = url;
    document.head.appendChild(script);
  });
}

async function depositBuxx(amount, description){
  if(!bankAccount.linked || !bankAccount.userId || !bankAccount.password){
    return {success:false, error:'No bank account linked — go to the Bank tab to connect yours.'};
  }
  return await gasPost({
    action:'submitDeposit',
    userId: bankAccount.userId,
    amount: amount,
    proofUrl: 'EquiStories Stable Sim — automated competition award',
    description: description,
  });
}

async function checkBankBalance(){
  if(!bankAccount.userId) return null;
  return await gasGet({action:'checkBalance', userId: bankAccount.userId});
}

  const linked = bankAccount.linked;
  const card = el('div','card');
  card.innerHTML = `
    <h3>💰 Account & Bank Settings</h3>

    <button id="bk_check" class="secondary">💳 Check Buxx Balance</button>

    <hr style="border-color:#4a392a; margin:12px 0;"/>

    <div class="small">🥇 1st — ฿1,000 &nbsp;|&nbsp; 🥈 2nd — ฿750 &nbsp;|&nbsp; 🥉 3rd — ฿500 &nbsp;|&nbsp; 4th — ฿250 &nbsp;|&nbsp; 5th — ฿100 &nbsp;|&nbsp; 6th — ฿50</div>

      if(r && r.success){

}

load();
