<style>
  html, body{ background:#1b1410; margin:0; padding:0; }
  #app{
    --bg:#1b1410; --panel:#241a14; --panel2:#2c2118; --accent:#c98a3a; --accent2:#7a9b6e;
    --text:#f1e6d8; --dim:#b5a392; --danger:#b1473f; --warn:#c9a23a; --good:#7a9b6e;
    font-family:'Georgia','Garamond',serif; color:var(--text); background:var(--bg);
    padding:18px; border-radius:10px; max-width:980px; margin:0 auto;
  }
  #app h1,#app h2,#app h3{font-family:'Palatino Linotype',Georgia,serif; letter-spacing:.5px; margin:.2em 0;}
  #app h1{color:var(--accent); border-bottom:2px solid var(--accent); padding-bottom:6px; font-size:1.5em;}
  #app .tabs{display:flex; gap:6px; margin:12px 0 16px; flex-wrap:wrap;}
  #app .tab{padding:7px 14px; background:var(--panel2); border:1px solid #4a392a; border-radius:6px 6px 0 0; cursor:pointer; color:var(--dim); font-size:.92em;}

  #app .card{background:var(--panel); border:1px solid #4a392a; border-radius:8px; padding:14px; margin-bottom:12px;}
  #app .row{display:flex; gap:10px; flex-wrap:wrap;}
  #app .row > div{flex:1; min-width:140px;}
  #app label{font-size:.78em; color:var(--dim); display:block; margin-bottom:2px; text-transform:uppercase; letter-spacing:.5px;}

  #app .horse-head .name{font-size:1.15em; color:var(--accent); font-weight:bold;}

  #app .statbar-bg{flex:1; height:7px; background:#15100c; border-radius:4px; overflow:hidden;}
  #app .statbar-fill{height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent));}
  #app .expbar-bg{height:9px; background:#15100c; border-radius:5px; overflow:hidden; margin-top:4px;}

  #app .result{padding:10px; border-radius:6px; margin-top:8px; font-weight:bold;}

const LIT_EXP = {}; // legacy — word count now handled dynamically

function calcLitExp(wordCount){
  if(!wordCount || wordCount < 200) return 0;
  return 2 + Math.floor((wordCount - 200) / 500) * 2;
}

const BONUS_EXP = {
  "Background": 3, "Shading": 3, "Rider/Handler shown": 4, "Additional Creature (per)": 2,
};

const BANK_URL   = 'https://script.google.com/macros/s/AKfycby9WLxUPDAPg9EH5aTPATzTkHd8XeSKXuQ0WYqyQoHusEbws85qxwaML6cSovDod80/exec';
// ← Paste your Stable Data script /exec URL here after deploying it:
let STABLE_URL = localStorage.getItem('equi_stable_url') || '';

const PLACEMENT_BUXX_AMOUNTS_LEGACY = { 1: 1000, 2: 750, 3: 500, 4: 250, 5: 100, 6: 50 };

let state = { horses: [], day: 1, log: [], loaded: false };
let bankAccount = { userId: '', password: '', linked: false };

function uid(){ return 'h_' + Math.random().toString(36).slice(2,9); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function todayLabel(d){ return "Day " + d; }

function newHorse(data){
  let stats = {};
  STATS.forEach(s=> stats[s] = 10);
  return {
    id: uid(), name: data.name, age: Number(data.age)||1, breed: data.breed,
    stage: data.stage || (Number(data.age)>=3 ? "adult" : Number(data.age)>=2 ? "two-year-old" : Number(data.age)>=1 ? "yearling" : "foal"),
    level: 1, exp: 0, stats: stats,
    breedingSlots: 0, breedingFilled: 0,
    status: "healthy", statusDays: 0,
    daysOwned: 0,
    eventsEnabled: data.eventsEnabled !== false,
    profileImage: null,
    artLog: [],
    history: [],
  };
}

function addLog(msg, dayOverride){
  state.log.unshift({day: dayOverride !== undefined ? dayOverride : state.day, msg});
  if(state.log.length>150) state.log.pop();
}

// ============================================
// STABLE API — save/load to Google Sheets
// ============================================

function stableGas(payload){
  return new Promise((resolve) => {
    if(!STABLE_URL){ resolve({success:false, error:'No Stable Data URL configured.'}); return; }
    const callbackName = 'stableCb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const url = STABLE_URL + '?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(payload));
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true; delete window[callbackName];
      try{ document.head.removeChild(script); }catch(e){}
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Network error reaching Stable Data script.'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out.'}); } }, 15000);
    script.src = url;
    document.head.appendChild(script);
  });
}

// Save entire stable to Google Sheets (called after every action)
async function save(){
  if(!bankAccount.linked || !STABLE_URL){ return; }
  const userId = bankAccount.userId;
  // Save state (day + log)
  await stableGas({ action:'saveStableState', userId, stateJson: JSON.stringify({day: state.day, log: state.log}) });
  // Save each horse (without artLog — that's stored separately)
  for(const h of state.horses){
    const { artLog, ...horseData } = h;
    await stableGas({ action:'saveHorse', userId, horseId: h.id, horseJson: JSON.stringify(horseData) });
  }
}

// Save just one horse (faster — used after training/competing)
async function saveHorse(horse){
  if(!bankAccount.linked || !STABLE_URL) return;
  const { artLog, ...horseData } = horse;
  await stableGas({ action:'saveHorse', userId: bankAccount.userId, horseId: horse.id, horseJson: JSON.stringify(horseData) });
}

// Save a new art log entry for a horse
async function saveArtEntry(horse, entry){
  if(!bankAccount.linked || !STABLE_URL) return;
  await stableGas({ action:'saveArtLogEntry', userId: bankAccount.userId, horseId: horse.id, entryJson: JSON.stringify(entry) });
}

async function saveBankAccount(){
  try{
    localStorage.setItem('equi_bank', JSON.stringify(bankAccount));
  }catch(e){ console.error('bank save failed', e); }
}

async function load(){
  // Always load bank credentials from localStorage first (they stay on this device)
  try{
    const b = localStorage.getItem('equi_bank');
    if(b){ const bd = JSON.parse(b); bankAccount = { userId: bd.userId||'', password: bd.password||'', linked: bd.linked||false }; }
  }catch(e){}

  if(bankAccount.linked && STABLE_URL){
    // Load from Google Sheets
    await loadFromSheets();
  } else {
    // No account linked yet — show login screen
    state.loaded = true;
    state.horses = [];
    state.day = 1;
    state.log = [];
  }
  render();
}

async function loadFromSheets(){
  const userId = bankAccount.userId;
  // Load stable state (day + log)
  const stateRes = await stableGas({ action:'loadStableState', userId });
  if(stateRes.success && stateRes.data){
    state.day = stateRes.data.day || 1;
    state.log = stateRes.data.log || [];
  } else {
    state.day = 1; state.log = [];
  }
  // Load horses
  const horsesRes = await stableGas({ action:'loadStable', userId });
  if(horsesRes.success && horsesRes.data){
    state.horses = horsesRes.data;
  } else {
    state.horses = [];
  }
  state.loaded = true;
}

function checkLevelUp(horse){
  let leveled = false;
  while(horse.level < 10 && horse.exp >= LEVEL_TABLE[horse.level+1].exp){
    horse.level += 1;
    const t = LEVEL_TABLE[horse.level];
    STATS.forEach(s=> horse.stats[s] += t.bonus);
    horse.breedingSlots += t.slots;
    leveled = true;
    addLog(`🎉 ${horse.name} reached Level ${horse.level}! +${t.bonus} to all stats` + (t.slots? `, +${t.slots} breeding slot(s) unlocked` : "") + ".");
  }
  return leveled;
}

const AILMENT_EVENTS = [

const INJURY_EVENTS = [

function advanceDay(){
  const endingDay = state.day; // the day that is wrapping up — events get logged here
  const logCountBefore = state.log.length;
  state.horses.forEach(h=>{
    if(h.status === "deceased") return;
    h.daysOwned += 1;
    if(h.status === "retired"){
      return; // retired horses don't generate individual daily noise
    }
    if(h.status !== "healthy"){
      h.statusDays -= 1;
      if(h.statusDays <= 0){
        addLog(`✅ ${h.name} has fully recovered from being ${h.status}.`, endingDay);
        h.status = "healthy"; h.statusDays = 0;
      } else {
        addLog(`🩺 ${h.name} is still recovering — ${h.statusDays} day(s) left before they're cleared for work.`, endingDay);
      }
    } else if(h.eventsEnabled === false){
      // health risk disabled for this horse — skip sickness/injury/death rolls entirely
    } else {
      const roll = Math.random();
      if(roll < 0.004){
        const severe = maybeSevereEvent(h, "turnout", 1); // already passed the outer roll, force trigger
        if(severe){
          addLog(`💥 ${severe.event.name}: ${severe.text}`, endingDay);
          addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`, endingDay);
        }
      } else if(roll < 0.03){
        const a = pick(AILMENT_EVENTS);
        h.status = "sick"; h.statusDays = rand(a.days[0], a.days[1]);
        addLog(`🤒 ${a.text.replaceAll("{name}", h.name)} Expect about ${h.statusDays} day(s) before they're back to normal.`, endingDay);
      } else if(roll < 0.05){
        const inj = pick(INJURY_EVENTS);
        h.status = "injured"; h.statusDays = rand(inj.days[0], inj.days[1]);
        addLog(`🩹 ${inj.text.replaceAll("{name}", h.name)} Out for roughly ${h.statusDays} day(s).`, endingDay);
      }
      // otherwise: a quiet day for this horse — no individual log entry
    }
    // birthday / aging every 365 days
    if(h.daysOwned > 0 && h.daysOwned % 365 === 0){
      h.age += 1;
      addLog(`🎂 ${h.name} has turned ${h.age} years old.`, endingDay);
    }
  });
  // if nothing horse-specific happened today, log one generic end-of-day line
  if(state.log.length === logCountBefore){
    addLog(`🌙 ${pick(GENERIC_DAY_BEATS)}`, endingDay);
  }
  state.day += 1;
  save();
}

function pick(arr){ return arr[rand(0,arr.length-1)]; }

function rollStoryBeat(horse){
  const roll = Math.random();
  let category;
  if(roll < 0.18) category = "breakthrough";
  else if(roll < 0.33) category = "spook";
  else if(roll < 0.43) category = "mishap";
  else category = "neutral";
  let text = pick(STORY_BEATS[category]).replaceAll("{name}", horse.name);
  return {category, text};
}

function maybeSevereEvent(horse, context, chance){
  if(Math.random() >= chance) return null;
  const pool = SEVERE_EVENTS.filter(e=> e.contexts.includes(context));
  if(pool.length === 0) return null;
  const event = pick(pool);
  const text = pick(event.text).replaceAll("{name}", horse.name);
  const died = Math.random() < event.deathChance;
  if(died){
    horse.status = "deceased";
    horse.statusDays = 0;
  } else {
    horse.status = "retired";
    horse.statusDays = 0;
  }
  horse.retired = true;
  return {event, text, died};
}

function applyTraining(horseId, trainingId, artType, litWordCount, bonusKeys, link, trainingId2){
  const h = state.horses.find(x=>x.id===horseId);
  const t = TRAININGS.find(x=>x.id===trainingId);
  const t2 = trainingId2 ? TRAININGS.find(x=>x.id===trainingId2) : null;
  if(!h || !t) return null;

  const severe = h.eventsEnabled !== false ? maybeSevereEvent(h, "training", 0.008) : null;
  if(severe){
    Object.entries(t.stats).forEach(([stat,val])=>{ h.stats[stat] += Math.ceil(val/2); });
    addLog(`💥 ${severe.event.name}: ${severe.text}`);
    addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`);
    save(); render();
    return {beat:{category:"severe", text:severe.text}, severe};
  }

  const beat = rollStoryBeat(h);
  let bonusExp = 0, bonusStat = null, injured = false;
  Object.entries(t.stats).forEach(([stat,val])=>{ h.stats[stat] += val; });
  if(t2) Object.entries(t2.stats).forEach(([stat,val])=>{ h.stats[stat] += val; });
  if(beat.category === "breakthrough"){
    bonusExp = rand(1,3);
    const statKeys = Object.keys(t2 ? allStats : t.stats);
    bonusStat = statKeys[rand(0,statKeys.length-1)];
    h.stats[bonusStat] += 1;
    h.exp += bonusExp;
  } else if(beat.category === "mishap" && h.eventsEnabled !== false){
    if(Math.random() < 0.35){
      injured = true;
      h.status = "injured"; h.statusDays = rand(2,5);
    }
  }
  let expGain = 0;
  let sources = [];
  if(artType && ART_EXP[artType]){ expGain += ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`); }
  const litExp = calcLitExp(litWordCount);
  if(litExp > 0){ expGain += litExp; sources.push(`Literature (${litWordCount} words) (+${litExp})`); }
  (bonusKeys||[]).forEach(k=>{
    if(BONUS_EXP[k]){ expGain += BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
  });
  h.exp += expGain;
  const allStats = {...t.stats};
  if(t2) Object.entries(t2.stats).forEach(([s,v])=>{ allStats[s] = (allStats[s]||0) + v; });
  const statsStr = Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
  const trainingLabel = t2 ? `${t.name} + ${t2.name}` : t.name;
  addLog(`🎨 ${h.name} completed "${trainingLabel}" training (${statsStr})` + (expGain? ` and earned +${expGain} EXP total — ${sources.join(", ")}.` : "."));
  addLog(`${beat.category==='breakthrough'?'✨':beat.category==='spook'?'😨':beat.category==='mishap'?'⚠️':'📝'} ${beat.text}` + (bonusStat? ` (Breakthrough bonus: +1 ${STAT_LABELS[bonusStat]}, +${bonusExp} EXP)` : "") + (injured? ` (${h.name} is now injured — out ${h.statusDays} day(s).)` : ""));
  const trainingEntry = {
    day: state.day, type: "training", label: trainingLabel,
    art: artType || null, lit: litWordCount ? `Literature (${litWordCount} words)` : null, bonuses: bonusKeys||[],
    exp: expGain, link: link || null,
  };
  h.artLog.unshift(trainingEntry);
  checkLevelUp(h);
  saveHorse(h);
  saveArtEntry(h, trainingEntry);
  save();
  render();
  return {beat, bonusStat, bonusExp, injured, expGain};
}

function runCompetition(horseId, discipline, difficulty, artType, litWordCount, bonusKeys, link){
  const h = state.horses.find(x=>x.id===horseId);
  if(!h) return null;

  const severe = h.eventsEnabled !== false ? maybeSevereEvent(h, "competition", 0.012) : null;
  if(severe){
    addLog(`💥 ${severe.event.name}: ${severe.text}`);
    addLog(severe.died ? `🖤 Despite every effort, ${h.name} did not survive. ${severe.event.outcomeNote}` : `🚫 ${h.name} is now permanently retired. ${severe.event.outcomeNote}`);
    save(); render();
    return {success:false, severe, expGain:0};
  }

  const relevant = DISCIPLINES[discipline];
  const avg = relevant.reduce((a,s)=>a+h.stats[s],0) / relevant.length;
  const diffVal = {Local:10, Regional:20, National:35, Elite:50}[difficulty];
  let successChance = clamp(50 + (avg - diffVal) * 2, 5, 95);
  const roll = rand(1,100);
  const success = roll <= successChance;
  let placement = null, expGain = 1; // entry exp
  let injured = false;
  if(success){
    const margin = successChance - roll; // how comfortably they "made" it
    const pRoll = rand(1,100) - margin*0.5;
    if(pRoll < 20) placement = 1;
    else if(pRoll < 45) placement = 2;
    else if(pRoll < 70) placement = 3;
    else if(pRoll < 82) placement = 4;
    else if(pRoll < 92) placement = 5;
    else placement = 6;
    const placeExp = {1:4,2:3,3:2}[placement] || 1;
    expGain += placeExp;
  } else {
    if(h.eventsEnabled !== false && Math.random() < 0.22){
      injured = true;
      h.status = "injured"; h.statusDays = rand(4,9);
    }
  }
  let sources = [];
  if(artType && ART_EXP[artType]){ expGain += ART_EXP[artType]; sources.push(`${artType} (+${ART_EXP[artType]})`); }
  const litExp = calcLitExp(litWordCount);
  if(litExp > 0){ expGain += litExp; sources.push(`Literature (${litWordCount} words) (+${litExp})`); }
  (bonusKeys||[]).forEach(k=>{
    if(BONUS_EXP[k]){ expGain += BONUS_EXP[k]; sources.push(`${k} (+${BONUS_EXP[k]})`); }
  });
  h.exp += expGain;
  const leveled = checkLevelUp(h);
  const resultMsg = success
    ? `🏆 ${h.name} competed in ${discipline} (${difficulty}) and placed ${placement===1?"1st":placement===2?"2nd":placement===3?"3rd":placement===4?"4th":placement===5?"5th":"6th"}! (+${expGain} EXP total${sources.length? " — "+sources.join(", "):""})`
    : `❌ ${h.name} did not place in ${discipline} (${difficulty}).` + (injured? ` They picked up a minor injury during the run (out ${h.statusDays} days).` : "") + ` (+${expGain} EXP total${sources.length? " — "+sources.join(", "):""})`;
  addLog(resultMsg);
  const compEntry = {
    day: state.day, type: "competition", label: `${discipline} (${difficulty})`,
    art: artType || null, lit: litWordCount ? `Literature (${litWordCount} words)` : null, bonuses: bonusKeys||[],
    exp: expGain, link: link || null, placement: success ? placement : null,
  };
  h.artLog.unshift(compEntry);
  saveArtEntry(h, compEntry);
  save();
  render();
  return {success, placement, injured, successChance, roll, avg, expGain};
}

function deleteHorse(id){
  if(!confirm('Remove this horse from your roster? This cannot be undone.')) return;
  const h = state.horses.find(x=>x.id===id);
  state.horses = state.horses.filter(x=>x.id!==id);
  if(h) addLog(`${h.name} has left the stable roster.`);
  if(bankAccount.linked && STABLE_URL){
    stableGas({action:'deleteHorse', userId:bankAccount.userId, horseId:id});
  }
  save();
  render();
}

function toggleEvents(id){
  const h = state.horses.find(x=>x.id===id);
  if(!h) return;
  h.eventsEnabled = !(h.eventsEnabled !== false); // flip, treating undefined as true
  addLog(`🛡️ Health risk events ${h.eventsEnabled ? "re-enabled" : "disabled"} for ${h.name}.`);
  save();
  render();
}

          ${stableSet ? `<div class="result success" style="margin-bottom:8px; font-size:.8em;">✅ Stable URL is configured.</div>` : `<div class="result fail" style="margin-bottom:8px; font-size:.8em;">⚠️ Not configured yet — players cannot log in until this is set.</div>`}
          <label>Stable Data Script URL</label>
          <input id="li_stable_url" placeholder="https://script.google.com/macros/s/…/exec" value="${STABLE_URL||''}" style="margin-bottom:6px;" />
          <button id="li_save_url" class="secondary" style="width:100%; margin-top:4px;">💾 Save Stable URL</button>
          <div id="li_url_result" style="margin-top:6px;"></div>
        </div>
      </details>
    </div>
  `;
  app.querySelector('#li_go').onclick = async () => {
    const userId   = app.querySelector('#li_user').value.trim();
    const password = app.querySelector('#li_pass').value.trim();
    const res      = app.querySelector('#li_result');
    if(!userId || !password){ res.innerHTML = '<div class="result fail">Please enter both your User ID and password.</div>'; return; }
    if(!STABLE_URL){ res.innerHTML = '<div class="result fail">⚠️ The Stable Data URL has not been configured yet — expand the Admin section below and paste it in first.</div>'; return; }
    res.innerHTML = '<div class="small" style="color:var(--dim);">Signing in…</div>';
    const data = await gasPost({action:'loginPlayer', userId, password});
    if(data && data.success){
      bankAccount = {userId, password, linked:true};
      await saveBankAccount();
      res.innerHTML = `<div class="result success">✅ Welcome, ${data.data.displayName}! Loading your stable…</div>`;
      await loadFromSheets();
      render();
    } else {
      res.innerHTML = `<div class="result fail">❌ ${(data && data.error)||'Login failed — check your User ID and password.'}</div>`;
    }
  };
  app.querySelector('#li_pass').onkeydown = (e) => { if(e.key==='Enter') app.querySelector('#li_go').click(); };
  app.querySelector('#li_save_url').onclick = () => {
    const url = app.querySelector('#li_stable_url').value.trim();
    const res = app.querySelector('#li_url_result');
    if(!url){ res.innerHTML = '<div class="result fail">Please paste a URL first.</div>'; return; }
    if(!url.includes('script.google.com')){ res.innerHTML = '<div class="result fail">That does not look like a Google Apps Script URL.</div>'; return; }
    STABLE_URL = url;
    localStorage.setItem('equi_stable_url', url);
    res.innerHTML = '<div class="result success">✅ Saved! You can now sign in.</div>';
    setTimeout(()=> renderLoginScreen(), 1200);
  };
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){ app.innerHTML = '<div style="padding:20px; color:var(--dim);">Loading…</div>'; return; }
  if(!bankAccount.linked){
    renderLoginScreen();
    return;
  }
  app.innerHTML = `
    <h1>🐴 EquiStories Stable Manager</h1>
    <div class="daybox">
      <div>Welcome back. <span class="small">${state.horses.length} horse(s) in the stable.</span></div>
      <div><span class="day">${todayLabel(state.day)}</span></div>
    </div>
    <div class="tabs">
      ${["roster","train","compete","log","bank"].map(t=>`<div class="tab ${activeTab===t?'active':''}" data-tab="${t}">${t==='roster'?'Stable Roster':t==='train'?'Training':t==='compete'?'Competitions':t==='bank'?'💰 Bank':'Day Log'}</div>`).join("")}
      <div style="flex:1"></div>
      <button data-act="nextday" style="margin-top:0;">⏭ Advance Day</button>
    </div>
    <div id="tabcontent"></div>
  `;
  const content = document.getElementById('tabcontent');

  if(activeTab === "roster"){
    content.appendChild(renderRoster());
  } else if(activeTab === "train"){
    content.appendChild(renderTraining());
  } else if(activeTab === "compete"){
    content.appendChild(renderCompete());
  } else if(activeTab === "log"){
    content.appendChild(renderLog());
  } else if(activeTab === "bank"){
    renderBank(content);
  }

  app.querySelectorAll('[data-tab]').forEach(t=> t.onclick = ()=>{ activeTab = t.dataset.tab; render(); });
  const nd = app.querySelector('[data-act="nextday"]');
  if(nd) nd.onclick = ()=>{ advanceDay(); activeTab = "log"; render(); };
  app.querySelectorAll('[data-act="del"]').forEach(b=> b.onclick = ()=> deleteHorse(b.dataset.id));
  app.querySelectorAll('[data-act="toggle-events"]').forEach(b=> b.onclick = ()=> toggleEvents(b.dataset.id));
  app.querySelectorAll('[data-act="toggle-artlog"]').forEach(b=> b.onclick = ()=>{
    const id = b.dataset.id;
    if(expandedArtLogs.has(id)) expandedArtLogs.delete(id); else expandedArtLogs.add(id);
    render();
  });
  app.querySelectorAll('[data-act="upload-photo"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-photo-input="${b.dataset.id}"]`);
      if(input) input.click();
    };
  });
  app.querySelectorAll('[data-photo-input]').forEach(inp=>{
    inp.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const h = state.horses.find(x=>x.id===inp.dataset.photoInput);
        if(h){ h.profileImage = reader.result; save(); render(); }
      };
      reader.readAsDataURL(file);
    };
  });
  app.querySelectorAll('[data-act="save-ref-link"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-ref-link-input="${b.dataset.id}"]`);
      const h = state.horses.find(x=>x.id===b.dataset.id);
      if(h && input){ h.referenceLink = input.value.trim() || null; save(); render(); }
    };
  });
  app.querySelectorAll('[data-act="upload-ref"]').forEach(b=>{
    b.onclick = ()=>{
      const input = app.querySelector(`[data-ref-input="${b.dataset.id}"]`);
      if(input) input.click();
    };
  });
  app.querySelectorAll('[data-ref-input]').forEach(inp=>{
    inp.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const h = state.horses.find(x=>x.id===inp.dataset.refInput);
        if(h){
          h.referenceImage = reader.result;
          if(!h.referenceExpLogged){
            h.referenceExpLogged = true;
            h.exp += 4;
            checkLevelUp(h);
            addLog(`📋 ${h.name}'s Registration / Reference Sheet uploaded — +4 EXP awarded!`);
          }
          save(); render();
        }
      };
      reader.readAsDataURL(file);
    };
  });
}

function renderTraining(){
  const wrap = el('div');
  if(state.horses.length===0){ wrap.appendChild(el('div','empty-msg','Add a horse first on the Stable Roster tab.')); return wrap; }

  const trainingOpts = TRAININGS.map(t=>`<option value="${t.id}">${t.name}</option>`).join("");
  const card = el('div','card');
  card.innerHTML = `
    <h3>Train a Horse</h3>
    <div class="row">
      <div>
        <label>Horse</label>
        <select id="tr_horse">${state.horses.filter(h=>h.status!=="deceased").map(h=>`<option value="${h.id}" ${h.status!=="healthy"?"disabled":""}>${h.name} (${h.status}${h.status!=="healthy" && h.status!=="retired" ? ` · ${h.statusDays}d left`:""})</option>`).join("")}</select>
      </div>
      <div style="flex:none;">
        <label>Mode</label>
        <div class="pill-select" style="margin-top:4px;">
          <div class="pill active" id="tr_mode_single">Single</div>
          <div class="pill" id="tr_mode_combined">⚡ Combined</div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div>
        <label id="tr_type_label">Training Type</label>
        <select id="tr_type">${trainingOpts}</select>
      </div>
      <div id="tr_type2_wrap" style="display:none;">
        <label>Second Training</label>
        <select id="tr_type2">${trainingOpts}</select>
      </div>
    </div>
    <div id="tr_prompt"></div>
    <div class="row" style="margin-top:8px;">
      <div>
        <label>Art logged? (optional)</label>
        <select id="tr_art">
          <option value="">No art this time</option>
          ${Object.keys(ART_EXP).map(k=>`<option value="${k}">${k} (+${ART_EXP[k]} EXP)</option>`).join("")}
        </select>
      </div>
      <div>
        <label>Literature word count (optional)</label>
        <input type="number" id="tr_lit_words" min="0" placeholder="e.g. 350 — min 200 for EXP" style="width:100%;" />
        <div class="small" id="tr_lit_preview" style="margin-top:3px; color:var(--accent);"></div>
      </div>
    </div>
    <div class="row" style="margin-top:6px;">
      <div>
        <label>Bonus elements (optional, stack with art and/or lit)</label>
        <div class="pill-select" id="tr_bonus_pills">
          ${Object.keys(BONUS_EXP).map(k=>`<div class="pill" data-bonus="${k}">${k} (+${BONUS_EXP[k]})</div>`).join("")}
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:6px;">
      <div><label>Link to your art/writing (optional)</label><input id="tr_link" placeholder="https://... (DeviantArt, Toyhouse, Tumblr, etc.)" /></div>
    </div>
    <button id="tr_go">Complete Training</button>
    <div id="tr_result"></div>
  `;
  wrap.appendChild(card);

  let combinedMode = false;

  card.querySelector('#tr_mode_single').onclick = ()=>{
    combinedMode = false;
    card.querySelector('#tr_mode_single').classList.add('active');
    card.querySelector('#tr_mode_combined').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display = 'none';
    card.querySelector('#tr_type_label').textContent = 'Training Type';
    refreshPrompt();
  };
  card.querySelector('#tr_mode_combined').onclick = ()=>{
    combinedMode = true;
    card.querySelector('#tr_mode_combined').classList.add('active');
    card.querySelector('#tr_mode_single').classList.remove('active');
    card.querySelector('#tr_type2_wrap').style.display = '';
    card.querySelector('#tr_type_label').textContent = 'First Training';
    refreshPrompt();
  };

  const selectedBonuses = new Set();
  card.querySelectorAll('[data-bonus]').forEach(p=>{
    p.onclick = ()=>{
      const k = p.dataset.bonus;
      if(selectedBonuses.has(k)){ selectedBonuses.delete(k); p.classList.remove('active'); }
      else { selectedBonuses.add(k); p.classList.add('active'); }
    };
  });

  function refreshPrompt(){
    const t = TRAININGS.find(x=>x.id===card.querySelector('#tr_type').value);
    const t2 = combinedMode ? TRAININGS.find(x=>x.id===card.querySelector('#tr_type2').value) : null;
    const allStats = {...t.stats};
    if(t2) Object.entries(t2.stats).forEach(([s,v])=>{ allStats[s] = (allStats[s]||0)+v; });
    const statsStr = Object.entries(allStats).map(([s,v])=>`+${v} ${STAT_LABELS[s]}`).join(", ");
    if(t2){
      card.querySelector('#tr_prompt').innerHTML = `<div class="prompt-box">⚡ <b>${t.name}</b> + <b>${t2.name}</b> <span style="font-size:.8em; color:var(--warn);">(Combined)</span><br>${t.prompt}<br><span class="small" style="opacity:.8;">${t2.prompt}</span><br><span class="small">Combined stat reward: ${statsStr}</span></div>`;
    } else {
      card.querySelector('#tr_prompt').innerHTML = `<div class="prompt-box">📝 <b>${t.name}</b> — ${t.prompt}<br><span class="small">Stat reward: ${statsStr}</span></div>`;
    }
  }
  refreshPrompt();
  card.querySelector('#tr_type').onchange = refreshPrompt;
  card.querySelector('#tr_type2').onchange = refreshPrompt;

  function updateLitPreview(){
    const wc = parseInt(card.querySelector('#tr_lit_words').value) || 0;
    const exp = calcLitExp(wc);
    const preview = card.querySelector('#tr_lit_preview');
    if(wc === 0){ preview.textContent = ""; }
    else if(wc < 200){ preview.textContent = "⚠️ Minimum 200 words for EXP (0 EXP)"; preview.style.color = "var(--warn)"; }
    else { preview.textContent = `✅ +${exp} EXP — ${2} base + ${Math.floor((wc-200)/500)*2} bonus (1 extra tier per 500 words after 200)`; preview.style.color = "var(--good)"; }
  }
  card.querySelector('#tr_lit_words').oninput = updateLitPreview;

  card.querySelector('#tr_go').onclick = ()=>{
    const hId = card.querySelector('#tr_horse').value;
    const tId = card.querySelector('#tr_type').value;
    const tId2 = combinedMode ? card.querySelector('#tr_type2').value : null;
    const art = card.querySelector('#tr_art').value;
    const litWords = parseInt(card.querySelector('#tr_lit_words').value) || 0;
    const bonusKeys = Array.from(selectedBonuses);
    const link = card.querySelector('#tr_link').value.trim();
    const h = state.horses.find(x=>x.id===hId);
    if(h.status !== "healthy"){
      card.querySelector('#tr_result').innerHTML = `<div class="result fail">${h.name} is currently ${h.status} and can't train for ${h.statusDays} more day(s).</div>`;
      return;
    }
    if(combinedMode && tId === tId2){
      card.querySelector('#tr_result').innerHTML = `<div class="result fail">Please choose two different training types for a combined session.</div>`;
      return;
    }
    const res = applyTraining(hId, tId, art, litWords, bonusKeys, link, tId2 || undefined);
    if(res.severe){
      const sv = res.severe;
      card.querySelector('#tr_result').innerHTML = `
        <div class="result fail">💥 ${sv.event.name}</div>
        <div class="prompt-box"><b>${sv.died ? '🖤 Did not survive' : '🚫 Career-ending'}</b><br>${sv.text}
          <div class="small" style="margin-top:8px;">${sv.event.outcomeNote}</div>
        </div>`;
      return;
    }
    const beat = res.beat;
    const icon = beat.category==='breakthrough'?'✨ Breakthrough!':beat.category==='spook'?'😨 Spooked!':beat.category==='mishap'?'⚠️ Mishap':'📝 Story Beat';
    const extra = res.bonusStat ? `<div class="small" style="margin-top:6px;">Bonus: +1 ${STAT_LABELS[res.bonusStat]}, +${res.bonusExp} EXP</div>` : "";
    const injNote = res.injured ? `<div class="small" style="margin-top:6px; color:var(--danger);">${h.name} picked up a minor injury — out for ${h.statusDays} day(s).</div>` : "";
    const expNote = res.expGain ? `<div class="small" style="margin-top:6px;">Total EXP this session: <b>+${res.expGain}</b></div>` : "";
    card.querySelector('#tr_result').innerHTML = `
      <div class="result success">Training logged!</div>
      <div class="prompt-box"><b>${icon}</b><br>${beat.text}${extra}${injNote}${expNote}
        <div class="small" style="margin-top:8px;">💡 Draw and/or write this moment for bonus inspiration — it's separate from the base training prompt above!</div>
      </div>`;
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=> p.classList.remove('active'));
    card.querySelector('#tr_link').value = "";
    card.querySelector('#tr_lit_words').value = "";
    card.querySelector('#tr_lit_preview').textContent = "";
  };

  return wrap;
}

      resultHtml += `</div>`;
      card.querySelector('#cp_result').innerHTML = resultHtml;
      if(buxx && bankAccount.linked){
        const h2 = state.horses.find(x=>x.id===card.querySelector('#cp_horse').value);
        const desc = `Competition award: ${placeStr} place — ${card.querySelector('#cp_disc').value} (${card.querySelector('#cp_diff').value})${h2?' with '+h2.name:''}`;
        depositBuxx(buxx, desc).then(depResult => {
          const existing = card.querySelector('#cp_result');
          if(depResult && depResult.success){
            existing.innerHTML += `<div class="result success" style="margin-top:4px;">✅ ฿${buxx.toLocaleString()} deposited to bank! New balance: <b>฿${Number(depResult.data.newBalance).toLocaleString()}</b></div>`;
          } else {
            existing.innerHTML += `<div class="result fail" style="margin-top:4px;">⚠️ Bank deposit failed: ${depResult ? depResult.error : 'Unknown error'}. Log in at the Bank tab and deposit manually.</div>`;
          }
        });
      }
    } else {
      card.querySelector('#cp_result').innerHTML = `<div class="result fail">No placement this time.${r.injured? " A minor injury occurred." : ""} Total EXP this entry: <b>+${r.expGain}</b>.</div>`;
    }
    selectedBonuses.clear();
    card.querySelectorAll('[data-bonus]').forEach(p=> p.classList.remove('active'));
    card.querySelector('#cp_link').value = "";
    card.querySelector('#cp_lit_words').value = "";
    card.querySelector('#cp_lit_preview').textContent = "";
    refreshInfo();
  };

  return wrap;
}


const PLACEMENT_BUXX_AMOUNTS = {1:1000, 2:750, 3:500, 4:250, 5:100, 6:50};

// Google Apps Script requires requests sent as plain text with JSON stringified in the body,
// AND the script must be deployed with "Anyone" access. We use a script-tag JSONP trick for GETs
// and a form POST via hidden iframe for POSTs to avoid CORS preflight blocks.

function gasPost(payload){
  return new Promise((resolve) => {
    const callbackName = 'gasCb_' + Date.now();
    // Encode payload as a URL param so GAS can read it via e.parameter.data
    const url = BANK_URL + '?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(payload));
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true;
      delete window[callbackName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; document.head.removeChild(script); resolve({success:false,error:'Network error'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out'}); } }, 12000);
    script.src = url;
    document.head.appendChild(script);
  });
}

function gasGet(params){
  return new Promise((resolve) => {
    const callbackName = 'gasCb_' + Date.now();
    const qs = Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const url = BANK_URL + '?' + qs + '&callback=' + callbackName;
    const script = document.createElement('script');
    let done = false;
    window[callbackName] = (data) => {
      done = true;
      delete window[callbackName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      if(!done){ done=true; delete window[callbackName]; document.head.removeChild(script); resolve({success:false,error:'Network error'}); }
    };
    setTimeout(()=>{ if(!done){ done=true; delete window[callbackName]; try{document.head.removeChild(script);}catch(e){} resolve({success:false,error:'Request timed out'}); } }, 12000);
    script.src = url;
    document.head.appendChild(script);
  });
}

async function depositBuxx(amount, description){
  if(!bankAccount.linked || !bankAccount.userId || !bankAccount.password){
    return {success:false, error:'No bank account linked — go to the Bank tab to connect yours.'};
  }
  return await gasPost({
    action:'submitDeposit',
    userId: bankAccount.userId,
    amount: amount,
    proofUrl: 'EquiStories Stable Sim — automated competition award',
    description: description,
  });
}

async function checkBankBalance(){
  if(!bankAccount.userId) return null;
  return await gasGet({action:'checkBalance', userId: bankAccount.userId});
}

  const linked = bankAccount.linked;
  const card = el('div','card');
  card.innerHTML = `
    <h3>💰 Account & Bank Settings</h3>
    ${linked
      ? `<div class="result success" style="margin-bottom:10px;">✅ Signed in as <b>${bankAccount.userId}</b></div>`
      : `<div class="result fail" style="margin-bottom:10px;">⚠️ Not signed in.</div>`
    }
    ${linked ? `
    <button id="bk_check" class="secondary">💳 Check Buxx Balance</button>
    <div id="bk_balance" style="margin-top:8px;"></div>
    <hr style="border-color:#4a392a; margin:12px 0;"/>
    <div class="small" style="color:var(--dim); margin-bottom:4px;">Competition Buxx awards (auto-deposited on placement):</div>
    <div class="small">🥇 1st — ฿1,000 &nbsp;|&nbsp; 🥈 2nd — ฿750 &nbsp;|&nbsp; 🥉 3rd — ฿500 &nbsp;|&nbsp; 4th — ฿250 &nbsp;|&nbsp; 5th — ฿100 &nbsp;|&nbsp; 6th — ฿50</div>
    <hr style="border-color:#4a392a; margin:12px 0;"/>
    <button id="bk_signout" class="danger">🔓 Sign Out</button>
    ` : `<p class="small" style="color:var(--dim);">You are not signed in. Return to the main screen to sign in.</p>`}
    <hr style="border-color:#4a392a; margin:16px 0;"/>
    <h3 style="margin-top:0;">⚙️ Admin: Stable Data URL</h3>
    <p class="small" style="color:var(--dim); margin-top:0;">Paste the /exec URL from your deployed Stable Data Apps Script. Only needs to be set once — it's saved in this browser.</p>
    <div style="display:flex; gap:6px; align-items:flex-end;">
      <div style="flex:1;"><label>Stable Data Script URL</label><input id="bk_stable_url" placeholder="https://script.google.com/macros/s/…/exec" value="${STABLE_URL||''}" /></div>
      <button id="bk_save_url" style="margin-top:0; white-space:nowrap;">💾 Save</button>
    </div>
    <div id="bk_url_result" style="margin-top:6px;"></div>
  `;
  container.appendChild(card);

  if(linked){
    card.querySelector('#bk_check').onclick = async ()=>{
      const balDiv = card.querySelector('#bk_balance');
      balDiv.innerHTML = '<div class="small" style="color:var(--dim);">Checking…</div>';
      const r = await checkBankBalance();
      if(r && r.success){
        balDiv.innerHTML = `<div class="result success">💳 <b>${r.data.displayName}</b>: <b>฿${Number(r.data.balance).toLocaleString()}</b></div>`;
      } else {
        balDiv.innerHTML = `<div class="result fail">Could not fetch balance: ${r ? r.error : 'Network error'}</div>`;
      }
    };
    card.querySelector('#bk_signout').onclick = async ()=>{
      if(!confirm('Sign out? Your stable data is saved to Google Sheets — sign back in anytime.')) return;
      bankAccount = {userId:'', password:'', linked:false};
      state.horses = []; state.day = 1; state.log = []; state.loaded = false;
      await saveBankAccount();
      load();
    };
  }

  card.querySelector('#bk_save_url').onclick = ()=>{
    const url = card.querySelector('#bk_stable_url').value.trim();
    const res = card.querySelector('#bk_url_result');
    if(!url){ res.innerHTML = '<div class="result fail">Please paste a URL first.</div>'; return; }
    if(!url.includes('script.google.com')){ res.innerHTML = '<div class="result fail">That does not look like a Google Apps Script URL.</div>'; return; }
    STABLE_URL = url;
    localStorage.setItem('equi_stable_url', url);
    res.innerHTML = '<div class="result success">✅ Stable URL saved to this browser!</div>';
  };
}


function renderLog(){
  const wrap = el('div','card');
  wrap.innerHTML = `<h3>Day-by-Day Log</h3><div class="log">${
    state.log.length===0 ? '<div class="small">Nothing has happened yet — advance a day or train a horse!</div>' :
    state.log.map(l=>`<div><b>${todayLabel(l.day)}:</b> ${l.msg}</div>`).join("")
  }</div>`;
  return wrap;
}
